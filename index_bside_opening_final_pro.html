<!DOCTYPE html>
<html>
<head>
  <title>Prep List</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/svg+xml" href="app-icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-title" content="Prep List">
  <meta name="application-name" content="Prep List">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f7f7f8">

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; min-width: 0; margin: 0; padding: 0;
      background: #ffffff; font-family: Arial, Helvetica, sans-serif;
      color: #000; overflow-x: hidden;
    }
    body { padding: 4px; }
    .page { width: 100%; min-width: 0; max-width: none; margin: 0 auto; background: #fff; }
    .title {
      text-align: center; font-size: 30px; font-weight: 900;
      letter-spacing: 7px; line-height: 1; margin: 2px 0 8px;
    }
    .controls {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.96); border: 2px solid #000;
      padding: 6px; margin-bottom: 8px; display: grid;
      grid-template-columns: 1fr 1fr; gap: 6px; align-items: stretch;
    }
    .status {
      grid-column: 1 / -1; font-size: 11px; font-weight: 900;
      color: #111; white-space: normal; line-height: 1.2;
      border-bottom: 1.5px solid #000; padding-bottom: 5px; margin-bottom: 1px;
    }
    button {
      border: 2px solid #000; background: #fff; color: #000;
      font-weight: 900; padding: 8px 4px; font-size: 11px; cursor: pointer;
      min-height: 34px; width: 100%;
      border-radius: 999px;
    }
    button:active { transform: scale(.98); }
    #editModeBtn {
      background: #000; color: #fff; border-color: #000;
    }
    #editModeBtn.editOn {
      background: #16a34a; color: #fff; border-color: #16a34a;
    }
    #deleteModeBtn {
      background: #000; color: #fff; border-color: #000;
    }
    #deleteModeBtn.deleteOn {
      background: #ff0000; color: #fff; border-color: #ff0000;
    }
    .addPanel {
      display: grid; grid-template-columns: 72px 1fr 82px;
      gap: 5px; margin-bottom: 8px; border: 2px solid #000; padding: 5px;
    }
    select, input, textarea {
      border: 2px solid #000; padding: 6px 4px; font-size: 11px;
      font-weight: 700; background: #fff; color: #000; min-width: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    #newSection { border-radius: 18px; padding-left: 7px; padding-right: 7px; }
    .layout {
      display: grid !important; grid-template-columns: 1fr 1fr !important;
      gap: 6px; align-items: start; width: 100%;
    }
    .leftCol, .rightCol { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .box { border: 2px solid #000; background: #fff; width: 100%; min-width: 0; }
    .boxTitle {
      text-align: center; font-size: 21px; font-weight: 900;
      padding: 3px 4px; border-bottom: 2px solid #000; line-height: 1.1;
    }
    .row {
      display: grid; grid-template-columns: 28px 1fr 55px;
      min-height: 31px; border-bottom: 1.5px solid #000; background: #fff;
    }
    .row:last-child { border-bottom: 0; }
    .checkCell {
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; min-height: 31px; padding: 2px;
    }
    .itemName {
      display: flex; align-items: center; padding: 3px 5px;
      font-size: 12px; font-weight: 900; line-height: 1.05;
      cursor: pointer; word-break: break-word; min-width: 0;
    }
    .itemDot {
      display: inline-block;
      font-size: 14px;
      margin-left: 4px;
      line-height: 1;
      font-weight: 900;
    }
    .itemDot.recipeDot {
      color: #16a34a;
    }
    .itemDot.photoDot {
      color: #dc2626;
    }
    .colorCell {
      display: flex; align-items: center; justify-content: flex-end;
      min-height: 31px; padding: 2px 5px 2px 2px;
    }
    .colorWheelSelect {
      width: 22px;
      height: 22px;
      min-width: 22px;
      min-height: 22px;
      padding: 0;
      border: 0;
      outline: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fff 0 47%, transparent 49%),
        conic-gradient(red, orange, yellow, lime, cyan, blue, purple, magenta, red);
      cursor: pointer;
      color: transparent;
      font-size: 0;
      line-height: 0;
      appearance: none;
      -webkit-appearance: none;
      box-shadow: none;
    }
    .colorWheelSelect:focus {
      outline: 0;
      box-shadow: none;
    }
    .colorWheelSelect option {
      color: #000;
      font-size: 14px;
      font-weight: 900;
    }
    .deleteBtn {
      width: 50px; height: 24px; border: 1.5px solid #000;
      background: #ff0000; color: #fff; padding: 0 1px;
      font-size: 9px; font-weight: 900; cursor: pointer; border-radius: 14px;
    }
    .customCheck {
      width: 20px; height: 20px; border: 2px solid #000; background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; line-height: 1; font-weight: 900;
      color: transparent; user-select: none;
    }
    .customCheck.checked { color: #ff0000; }
    .row.row-red { background: rgba(255, 0, 0, .15); }
    .row.row-green { background: rgba(0, 180, 0, .14); }
    .row.row-yellow { background: rgba(255, 210, 0, .24); }
    .row.row-blue { background: rgba(0, 145, 255, .14); }
    .loading { text-align: center; padding: 40px; font-size: 18px; font-weight: 900; }
    .modalOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.55); display: none;
      align-items: center; justify-content: center; padding: 12px;
    }
    .modalOverlay.show { display: flex; }
    .modalBox {
      width: min(720px, 100%); max-height: 88vh; overflow: auto;
      background: #fff; border: 3px solid #000; padding: 10px;
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }
    .modalHeader {
      display: grid; grid-template-columns: 1fr auto; gap: 8px;
      align-items: center; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 8px;
    }
    .modalTitle { font-size: 18px; font-weight: 900; line-height: 1.1; }
    .modalTitleRow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .recipeMultiplierTools {
      display: none;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .recipeMultiplierTools.show {
      display: flex;
    }
    .recipeMultiplierTools button {
      width: auto;
      min-height: 28px;
      padding: 4px 9px;
      font-size: 11px;
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
      line-height: 1;
      border-radius: 999px;
    }
    .modalActionBtn {
      display: none;
      width: auto;
      min-height: 28px;
      padding: 4px 10px;
      font-size: 11px;
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
      line-height: 1;
      border-radius: 999px;
    }
    .modalActionBtn.show {
      display: inline-block;
    }
    .modalActionSelect {
      display: none;
      width: auto;
      min-height: 28px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      background: #d1d5db;
      color: #000;
      border: 2px solid #9ca3af;
      border-radius: 999px;
      line-height: 1;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
    }
    .modalActionSelect.show {
      display: inline-block;
    }
    .moveSectionBtn {
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
    }
    .photoBtn,
    .photoDangerBtn {
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
    }
    .photoModalOverlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .photoModalOverlay.show {
      display: flex;
    }
    .photoModalBox {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 3px solid #000;
      padding: 10px;
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }
    .photoModalHeader {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
      margin-bottom: 8px;
    }
    .photoModalTitle {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
    }
    .photoImage {
      display: block;
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border: 2px solid #000;
      background: #fff;
    }
    .photoEmpty {
      border: 2px solid #000;
      padding: 18px;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      color: #555;
    }
    .modalSub { font-size: 11px; font-weight: 800; margin-top: 4px; color: #333; }
    .closeBtn {
      width: 42px;
      min-width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      background: transparent;
      color: #dc2626;
      border: 0;
      border-radius: 50%;
      font-size: 34px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }
    .recipeTextarea {
      width: 100%; min-height: 260px; resize: vertical;
      font-size: 16px; line-height: 1.35; font-weight: 700; padding: 10px;
    }
    .recipeTextView {
      width: 100%; min-height: 160px; white-space: pre-wrap;
      border: 2px solid #000; padding: 10px; font-size: 16px;
      line-height: 1.35; font-weight: 700; background: #fff;
    }
    .recipeCheckList {
      width: 100%;
      min-height: 160px;
      border: 2px solid #000;
      background: #fff;
      padding: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
    }
    .recipeCheckLine {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 7px;
      align-items: start;
      padding: 7px 10px;
      border-bottom: 1.5px solid #000;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .recipeCheckLine:last-child {
      border-bottom: 0;
    }
    .recipeCheckLine input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin: 0;
      accent-color: #16a34a;
    }
    .recipeCheckSpacer {
      width: 22px;
      height: 22px;
      display: block;
    }
    .recipeCheckLine.noCheck .recipeCheckText {
      opacity: .95;
    }
    .recipeCheckLine.done .recipeCheckText {
      text-decoration: line-through;
      opacity: .55;
    }
    .recipeEmpty { color: #777; font-style: italic; }
    .modalFoot { margin-top: 8px; font-size: 11px; font-weight: 900; color: #111; }
    @media (min-width: 780px) {
      body { padding: 12px; }
      .page { max-width: 1080px; }
      .title { font-size: 58px; letter-spacing: 12px; margin: 4px 0 14px; }
      .controls {
        padding: 8px; margin-bottom: 12px;
        grid-template-columns: 1fr 140px 140px;
        grid-template-rows: auto auto;
        gap: 8px;
        align-items: stretch;
      }
      .status {
        grid-column: 1;
        grid-row: 1 / 3;
        align-self: stretch;
        display: flex;
        align-items: center;
        font-size: 14px;
        white-space: nowrap;
        border-bottom: 0;
        padding-bottom: 0;
        margin-bottom: 0;
      }
      button { padding: 9px 12px; font-size: 14px; min-height: 40px; }
      .controls button:nth-of-type(1) { grid-column: 2; grid-row: 1; }
      .controls button:nth-of-type(2) { grid-column: 3; grid-row: 1; }
      #editModeBtn { grid-column: 2; grid-row: 2; }
      #deleteModeBtn { grid-column: 3; grid-row: 2; }
      .addPanel {
        grid-template-columns: 130px 1fr auto; gap: 8px;
        margin-bottom: 12px; padding: 8px;
      }
      select, input { padding: 9px; font-size: 15px; }
      .layout { gap: 20px; }
      .leftCol, .rightCol { gap: 22px; }
      .boxTitle { font-size: 32px; padding: 4px 8px; }
      .row { grid-template-columns: 58px 1fr 106px; min-height: 40px; }
      .checkCell, .colorCell { min-height: 40px; padding: 4px; }
      .itemName { font-size: 20px; padding: 4px 14px; line-height: 1.1; }
      .itemDot { font-size: 20px; margin-left: 8px; }
      .photoModalTitle { font-size: 26px; }
      .colorWheelSelect { width: 24px; height: 24px; min-width: 24px; min-height: 24px; }
      .colorCell { justify-content: flex-end; padding-right: 12px; }
      .deleteBtn { width: 96px; height: 32px; font-size: 13px; padding: 1px 2px; }
      .customCheck { width: 28px; height: 28px; font-size: 28px; }
      .modalTitle { font-size: 26px; }
      .recipeMultiplierTools button { min-height: 30px; padding: 5px 9px; font-size: 12px; }
      .modalActionBtn { min-height: 30px; padding: 5px 10px; font-size: 12px; }
      .modalActionSelect { min-height: 30px; padding: 5px 10px; font-size: 12px; }
      .recipeCheckLine { grid-template-columns: 30px 1fr; padding: 8px 10px; }
      .modalSub, .modalFoot { font-size: 13px; }
    }
    :root {
      --ink: #1f2937;
      --muted-ink: #6b7280;
      --line-soft: #d1d5db;
      --cream: #f7f7f8;
      --paper: #ffffff;
      --sage: #eeeeef;
      --olive: #4b5563;
      --olive-dark: #111827;
      --warm-grey: #e5e7eb;
      --danger: #dc2626;
      --recipe-dot: #16a34a;
      --photo-dot: #dc2626;
      --blue-soft: #e5e7eb;
      --yellow-soft: #f3f4f6;
      --red-soft: #f4eeee;
      --green-soft: #edf4ef;
      --shadow-soft: 0 8px 22px rgba(17, 24, 39, .08);
    }
    html, body {
      background: linear-gradient(180deg, #f7f7f8 0%, #ececef 100%) !important;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Arial, Helvetica, sans-serif;
      letter-spacing: -.01em;
    }
    .title {
      color: #111827 !important;
      text-shadow: none !important;
    }
    .controls,
    .addPanel,
    .box,
    .modalBox,
    .photoModalBox {
      background: rgba(255, 255, 255, .92) !important;
      border: 1.5px solid var(--line-soft) !important;
      box-shadow: var(--shadow-soft) !important;
    }
    .status,
    .boxTitle,
    .modalHeader,
    .photoModalHeader {
      background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%) !important;
      color: #111827 !important;
      border: 1px solid #d1d5db !important;
    }
    .box {
      border-radius: 28px !important;
      padding: 6px;
      overflow: hidden;
    }
    .boxTitle {
      border-radius: 999px !important;
      margin: 4px 4px 8px !important;
      padding: 7px 10px !important;
      letter-spacing: -.02em;
    }
    .leftCol,
    .rightCol {
      border-radius: 28px;
    }
    .controls button,
    .addPanel button,
    .recipeMultiplierTools button,
    .modalActionBtn,
    .modalActionSelect,
    .photoBtn,
    .photoDangerBtn {
      background: #e5e7eb !important;
      color: #111827 !important;
      border-color: #c7cbd1 !important;
      box-shadow: 0 2px 6px rgba(17, 24, 39, .05) !important;
    }
    #editModeBtn,
    #deleteModeBtn {
      background: #374151 !important;
      color: #fff !important;
      border-color: #374151 !important;
    }
    #editModeBtn.editOn {
      background: #4b5563 !important;
      color: #fff !important;
      border-color: #4b5563 !important;
    }
    #deleteModeBtn.deleteOn,
    .deleteBtn {
      background: #dc2626 !important;
      color: #fff !important;
      border-color: #dc2626 !important;
    }
    select,
    input,
    textarea {
      border-color: #d1d5db !important;
      color: #111827 !important;
      background: #fff !important;
    }
    #newSection {
      background: #f3f4f6 !important;
      color: #111827 !important;
      border-color: #c7cbd1 !important;
      border-radius: 999px !important;
    }
    .row {
      background: #fff !important;
      border: 1.2px solid #d1d5db !important;
      border-radius: 999px !important;
      box-shadow: 0 1px 4px rgba(17, 24, 39, .04) !important;
    }
    .itemName {
      color: #111827 !important;
      font-weight: 850;
    }
    .customCheck {
      border-color: #6b7280 !important;
      border-radius: 999px !important;
    }
    .customCheck.checked {
      color: #dc2626 !important;
      border-color: #dc2626 !important;
      background: #fff !important;
    }
    .row.row-red {
      background: #f3e9e9 !important;
      border-color: #e5caca !important;
    }
    .row.row-green {
      background: #eef3ee !important;
      border-color: #d0ddd0 !important;
    }
    .row.row-yellow {
      background: #f5f1e5 !important;
      border-color: #e6dcc3 !important;
    }
    .row.row-blue {
      background: #e9eef5 !important;
      border-color: #ccd7e6 !important;
    }
    .modalOverlay,
    .photoModalOverlay {
      background: rgba(17, 24, 39, .48) !important;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .recipeTextarea,
    .recipeTextView,
    .recipeCheckList,
    .photoImage,
    .photoEmpty {
      background: #fff !important;
      border: 1.5px solid #d1d5db !important;
      color: #111827 !important;
    }
    .recipeCheckLine {
      background: #fff !important;
      border: 1.2px solid #d1d5db !important;
      border-radius: 18px !important;
    }
    .closeBtn {
      color: #dc2626 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }
    .legacyAddPanel {
      display: none !important;
    }
    .addModalOverlay {
      position: fixed;
      inset: 0;
      z-index: 1300;
      background: rgba(17, 24, 39, .48);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .addModalOverlay.show {
      display: flex;
    }
    .addModalBox {
      width: min(440px, 100%);
      background: #fff;
      border: 1.5px solid #d1d5db;
      border-radius: 28px;
      padding: 10px;
      box-shadow: 0 12px 32px rgba(17, 24, 39, .16);
    }
    .addModalHeader {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
      border: 1px solid #d1d5db;
      border-radius: 24px;
      padding: 8px 10px;
      margin-bottom: 10px;
    }
    .addModalTitle {
      font-size: 22px;
      font-weight: 950;
      color: #111827;
      line-height: 1;
    }
    .addModalBody {
      display: grid;
      gap: 8px;
      padding: 4px;
    }
    .addLabel {
      font-size: 12px;
      font-weight: 900;
      color: #374151;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .popupInput {
      width: 100%;
      min-height: 44px;
      border-radius: 999px !important;
      border: 1.5px solid #d1d5db !important;
      background: #fff !important;
      color: #111827 !important;
      padding: 10px 14px !important;
      font-size: 16px !important;
      font-weight: 850 !important;
    }
    .popupAddBtn {
      margin-top: 4px;
      min-height: 46px;
      border-radius: 999px !important;
      background: #374151 !important;
      color: #fff !important;
      border-color: #374151 !important;
      font-size: 15px !important;
      font-weight: 950 !important;
    }
    .colorWheelSelect {
      width: 17px !important;
      height: 17px !important;
      min-width: 17px !important;
      min-height: 17px !important;
      aspect-ratio: 1 / 1 !important;
      padding: 0 !important;
      border: 0 !important;
      outline: 0 !important;
      border-radius: 50% !important;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.60) 0 17%, transparent 18%),
        conic-gradient(#ef4444, #f97316, #fde047, #22c55e, #14b8a6, #38bdf8, #3b82f6, #8b5cf6, #ec4899, #ef4444) !important;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
      background-color: transparent !important;
      cursor: pointer !important;
      color: transparent !important;
      font-size: 0 !important;
      line-height: 0 !important;
      appearance: none !important;
      -webkit-appearance: none !important;
      box-shadow: none !important;
      overflow: hidden !important;
      transform: translateX(2px);
    }
    .colorWheelSelect:focus {
      outline: 0 !important;
      box-shadow: none !important;
    }
    @media (min-width: 780px) {
      .colorWheelSelect {
        width: 19px !important;
        height: 19px !important;
        min-width: 19px !important;
        min-height: 19px !important;
        transform: translateX(4px);
      }
    }
    #deleteModeBtn {
      display: none !important;
    }
    body.edit-mode-active #deleteModeBtn {
      display: block !important;
    }

      pointer-events: none !important;

      height: 100vh !important;
      height: 100dvh !important;
      padding: 0 !important;
      margin: 0 !important;

      transition: opacity .86s cubic-bezier(.22,.61,.36,1) !important;

      opacity: 0 !important;
    }

    .appSplash.videoSplash.hide {
      display: none !important;
    }

    .splashVideo {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, deleteField,
      onSnapshot, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyDzdxT4kocIK04UJhhbMQjpVw4Wtim5yVg",
      authDomain: "prep-5ada7.firebaseapp.com",
      projectId: "prep-5ada7",
      storageBucket: "prep-5ada7.firebasestorage.app",
      messagingSenderId: "678949496330",
      appId: "1:678949496330:web:037d9332743ec51638e1f3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const prepRef = collection(db, "prepItems");
    const homeConfigRef = doc(db, "prepMeta", "homeConfig");
    let homeConfigCache = null;
    let isApplyingRemoteHomeConfig = false;
    let homeConfigSaveTimer = null;
    let items = [];
    let deleteMode = false;
    let editMode = false;
    let isSaving = false;
    let activeRecipeItemId = null;
    let recipeSaveTimer = null;
    let recipeCheckSaveTimer = null;
    let originalRecipePreview = "";
    let currentRecipePreview = "";
    let activeMultiplierValue = 1;
    let activePhotoItemId = null;
    let currentPageId = "prep-list";

    const HOME_CONFIG_KEY = "prep_home_config_v1";
    const HOME_OPEN_KEY = "prep_home_open_v1";
    const DEFAULT_PAGE_ID = "prep-list";
    let searchQuery = "";
    let isOffline = !navigator.onLine;
    const PENDING_WRITES_KEY = "prep_pending_writes_v2";
    const SECTION_ORDER_CONFIG_KEY = "prep_section_order_config_v1";
    function getPendingWrites() {
      try {
        const raw = localStorage.getItem(PENDING_WRITES_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }
    function savePendingWrites(queue) {
      localStorage.setItem(PENDING_WRITES_KEY, JSON.stringify(queue));
      updateOfflineBadge();
    }
    function queueWrite(entry) {
      const queue = getPendingWrites();
      queue.push({ ...entry, queuedAt: Date.now() });
      savePendingWrites(queue);
      setStatus("Offline saved locally - will sync when online");
    }
    function getSectionOrderConfig() {
      try {
        const raw = localStorage.getItem(SECTION_ORDER_CONFIG_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }
    function saveSectionOrderConfig(config) {
      localStorage.setItem(SECTION_ORDER_CONFIG_KEY, JSON.stringify(config || {}));
    }
    function isOrderSection(section) {
      const config = getSectionOrderConfig();
      return !!config[normalizeSectionName(section)];
    }
    function updateOfflineBadge() {
      const count = getPendingWrites().length;
      const existing = document.getElementById("offlineBadge");
      if (!existing) return;
      if (!navigator.onLine || count > 0) {
        existing.classList.add("show");
        existing.textContent = !navigator.onLine
          ? `OFFLINE MODE - ${count} change(s) saved on this iPhone`
          : `SYNCING - ${count} offline change(s) waiting`;
      } else {
        existing.classList.remove("show");
        existing.textContent = "";
      }
    }
    async function savePatch(id, patch, options = {}) {
      const localItem = items.find(x => x.id === id);
      if (localItem && patch) Object.assign(localItem, patch);
      const cleanPatch = { ...(patch || {}) };
      delete cleanPatch.updatedAt;
      if (!navigator.onLine) {
        queueWrite({ type: "update", id, patch: cleanPatch });
        return;
      }
      try {
        await updateDoc(doc(db, "prepItems", id), {
          ...cleanPatch,
          updatedAt: serverTimestamp()
        });
        if (!options.silent) setStatus("Saved OK / real-time sync");
      } catch (error) {
        console.error(error);
        queueWrite({ type: "update", id, patch: cleanPatch });
      }
    }
    async function createItemOfflineSafe(id, data) {
      const cleanData = { ...(data || {}) };
      delete cleanData.updatedAt;
      if (!items.some(x => x.id === id)) items.push({ ...cleanData, id });
      sortItemsLocal();
      render();
      if (!navigator.onLine) {
        queueWrite({ type: "set", id, data: cleanData });
        return;
      }
      try {
        await setDoc(doc(db, "prepItems", id), {
          ...cleanData,
          updatedAt: serverTimestamp()
        });
        setStatus("Added OK");
      } catch (error) {
        console.error(error);
        queueWrite({ type: "set", id, data: cleanData });
      }
    }
    async function deleteItemOfflineSafe(id) {
      items = items.filter(x => x.id !== id);
      render();
      if (!navigator.onLine) {
        queueWrite({ type: "delete", id });
        return;
      }
      try {
        await deleteDoc(doc(db, "prepItems", id));
        setStatus("Deleted OK");
      } catch (error) {
        console.error(error);
        queueWrite({ type: "delete", id });
      }
    }
    async function flushPendingWrites() {
      if (!navigator.onLine) {
        updateOfflineBadge();
        return;
      }
      const queue = getPendingWrites();
      if (!queue.length) {
        updateOfflineBadge();
        return;
      }
      setStatus(`Syncing ${queue.length} offline change(s)...`);
      const remaining = [];
      for (const entry of queue) {
        try {
          if (entry.type === "set") {
            await setDoc(doc(db, "prepItems", entry.id), {
              ...(entry.data || {}),
              updatedAt: serverTimestamp()
            });
          } else if (entry.type === "update") {
            await updateDoc(doc(db, "prepItems", entry.id), {
              ...(entry.patch || {}),
              updatedAt: serverTimestamp()
            });
          } else if (entry.type === "delete") {
            await deleteDoc(doc(db, "prepItems", entry.id));
          }
        } catch (error) {
          console.error("Offline sync failed", entry, error);
          remaining.push(entry);
        }
      }
      savePendingWrites(remaining);
      setStatus(remaining.length ? `Some offline changes still waiting: ${remaining.length}` : "Offline changes synced OK");
    }
    window.addEventListener("online", () => {
      isOffline = false;
      updateOfflineBadge();
      flushPendingWrites();
      syncHomeConfigNow();
    });
    window.addEventListener("offline", () => {
      isOffline = true;
      updateOfflineBadge();
      setStatus("Offline mode - changes will save on this iPhone and sync later");
    });

    function makeLocalId(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function createDefaultHomeConfig() {
      return {
        categories: [
          {
            id: "kitchen-main",
            name: "Kitchen",
            pinned: true,
            subpages: [
              { id: DEFAULT_PAGE_ID, name: "Prep List", pinned: true }
            ]
          }
        ]
      };
    }

    function repairHomeConfig(config) {
      const fallback = createDefaultHomeConfig();

      if (!config || !Array.isArray(config.categories)) return fallback;

      config.categories = config.categories.filter(category => category && category.id && category.name);

      // Prevent blank Home screen if localStorage saved an empty category list.
      if (!config.categories.length) {
        config.categories = fallback.categories;
        return config;
      }

      config.categories.forEach(category => {
        if (!Array.isArray(category.subpages)) category.subpages = [];
        category.subpages = category.subpages.filter(page => page && page.id && page.name);
      });

      // Make sure the original Prep List page can always be reached.
      const hasDefaultPage = config.categories.some(category =>
        (category.subpages || []).some(page => page.id === DEFAULT_PAGE_ID)
      );

      if (!hasDefaultPage) {
        config.categories[0].subpages = config.categories[0].subpages || [];
        config.categories[0].subpages.unshift({ id: DEFAULT_PAGE_ID, name: "Prep List", pinned: true });
      }

      return config;
    }


    function normalizeHomeConfigForCompare(config) {
      const fixed = repairHomeConfig(config);
      const categories = [...(fixed.categories || [])]
        .map(category => ({
          id: category.id,
          name: category.name,
          pinned: !!category.pinned,
          subpages: [...(category.subpages || [])]
            .map(page => ({ id: page.id, name: page.name, pinned: !!page.pinned }))
            .sort((a, b) => compareText(a.id, b.id))
        }))
        .sort((a, b) => compareText(a.id, b.id));

      return JSON.stringify({ categories });
    }

    function mergeHomeConfigs(localConfig, remoteConfig) {
      const local = repairHomeConfig(localConfig);
      const remote = repairHomeConfig(remoteConfig);
      const categoryMap = new Map();

      function absorb(source, preferNames = false) {
        (source.categories || []).forEach(category => {
          if (!category || !category.id) return;

          const existing = categoryMap.get(category.id) || {
            id: category.id,
            name: category.name || "Category",
            pinned: !!category.pinned,
            subpages: []
          };

          if (preferNames || !existing.name) existing.name = category.name || existing.name;
          existing.pinned = !!existing.pinned || !!category.pinned;

          const pageMap = new Map((existing.subpages || []).map(page => [page.id, page]));

          (category.subpages || []).forEach(page => {
            if (!page || !page.id) return;

            const existingPage = pageMap.get(page.id) || {
              id: page.id,
              name: page.name || "Subpage",
              pinned: !!page.pinned
            };

            if (preferNames || !existingPage.name) existingPage.name = page.name || existingPage.name;
            existingPage.pinned = !!existingPage.pinned || !!page.pinned;

            pageMap.set(page.id, existingPage);
          });

          existing.subpages = Array.from(pageMap.values());
          categoryMap.set(category.id, existing);
        });
      }

      // Local first preserves categories made on this device.
      // Remote second preserves latest shared names when ids match.
      absorb(local, false);
      absorb(remote, true);

      return repairHomeConfig({ categories: Array.from(categoryMap.values()) });
    }

    function getLocalHomeConfigRaw() {
      try {
        const raw = localStorage.getItem(HOME_CONFIG_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function writeHomeConfigLocal(config) {
      localStorage.setItem(HOME_CONFIG_KEY, JSON.stringify(config || { categories: [] }));
    }

    function getHomeConfig() {
      const base = homeConfigCache || getLocalHomeConfigRaw() || createDefaultHomeConfig();
      return repairHomeConfig(base);
    }

    function saveHomeConfig(config, options = {}) {
      const fixed = repairHomeConfig(config);
      homeConfigCache = fixed;
      writeHomeConfigLocal(fixed);

      if (options.localOnly || isApplyingRemoteHomeConfig) return;

      if (homeConfigSaveTimer) clearTimeout(homeConfigSaveTimer);

      homeConfigSaveTimer = setTimeout(async () => {
        try {
          await setDoc(homeConfigRef, {
            ...fixed,
            updatedAt: serverTimestamp()
          }, { merge: true });
        } catch (error) {
          console.warn("Home config cloud sync failed; saved locally", error);
          setStatus("Home saved locally - will sync when online");
        }
      }, 250);
    }

    function syncHomeConfigNow() {
      if (!navigator.onLine) return;
      const config = getHomeConfig();

      setDoc(homeConfigRef, {
        ...config,
        updatedAt: serverTimestamp()
      }, { merge: true }).catch(error => {
        console.warn("Home config sync retry failed", error);
      });
    }

    function loadHomeConfigRealtime() {
      // Show local Home immediately, then Firestore will merge into it when available.
      homeConfigCache = repairHomeConfig(getLocalHomeConfigRaw() || createDefaultHomeConfig());
      writeHomeConfigLocal(homeConfigCache);
      renderHome();

      onSnapshot(homeConfigRef, snapshot => {
        const local = getLocalHomeConfigRaw() || homeConfigCache || createDefaultHomeConfig();

        if (!snapshot.exists()) {
          saveHomeConfig(local);
          syncHomeConfigNow();
          return;
        }

        const remote = snapshot.data();
        const merged = mergeHomeConfigs(local, remote);
        const remoteChanged = normalizeHomeConfigForCompare(merged) !== normalizeHomeConfigForCompare(remote);

        isApplyingRemoteHomeConfig = true;
        homeConfigCache = merged;
        writeHomeConfigLocal(merged);
        isApplyingRemoteHomeConfig = false;

        renderHome();

        if (remoteChanged && navigator.onLine) {
          saveHomeConfig(merged);
        }

        if (document.body.classList.contains("app-mode")) {
          const found = findHomePage(currentPageId);
          if (!found) {
            currentPageId = DEFAULT_PAGE_ID;
            document.body.classList.remove("app-mode");
          }

          const title = document.getElementById("activePageTitle");
          if (title) title.textContent = getActivePageName().toUpperCase();

          updateSectionDropdown();
          render();
        }
      }, error => {
        console.warn("Home config realtime sync failed; using local config", error);
        renderHome();
      });
    }

    window.deleteHomeCategory = async function(categoryId, btn) {
      animateSectionDeletePress(btn);
      await new Promise(resolve => setTimeout(resolve, 160));

      const config = getHomeConfig();
      const category = (config.categories || []).find(c => c.id === categoryId);
      if (!category) return;

      const subpages = category.subpages || [];
      const pageIds = subpages.map(page => page.id);
      const relatedItems = items.filter(item => pageIds.includes(item.pageId || DEFAULT_PAGE_ID));

      const ok = confirm(`Delete category "${category.name}"?\n\nThis will delete ${subpages.length} subpage(s) and ${relatedItems.length} item(s).`);
      if (!ok) {
        setStatus(`Delete category cancelled: ${category.name}`);
        return;
      }

      config.categories = (config.categories || []).filter(c => c.id !== categoryId);
      saveHomeConfig(config);

      const openConfig = getHomeOpenConfig();
      delete openConfig[categoryId];
      saveHomeOpenConfig(openConfig);

      items = items.filter(item => !pageIds.includes(item.pageId || DEFAULT_PAGE_ID));

      pageIds.forEach(pageId => {
        localStorage.removeItem(`${CUSTOM_SECTIONS_KEY}_${pageId}`);
      });

      if (pageIds.includes(currentPageId)) {
        currentPageId = DEFAULT_PAGE_ID;
        document.body.classList.remove("app-mode");
      }

      renderHome();
      render();

      if (!relatedItems.length) {
        setStatus(`Category deleted: ${category.name}`);
        return;
      }

      if (!navigator.onLine) {
        relatedItems.forEach(item => queueWrite({ type: "delete", id: item.id }));
        setStatus(`Category deleted locally: ${category.name}. Will sync ${relatedItems.length} item(s) later.`);
        return;
      }

      try {
        await Promise.all(relatedItems.map(item => deleteDoc(doc(db, "prepItems", item.id))));
        setStatus(`Category deleted OK: ${category.name}`);
      } catch (error) {
        console.error(error);
        relatedItems.forEach(item => queueWrite({ type: "delete", id: item.id }));
        setStatus(`Category deleted locally: ${category.name}. Sync later.`);
      }
    };

    let startupSoundPlayed = false;

    function playStartupSoundOnce() {
      if (startupSoundPlayed) return;
      startupSoundPlayed = true;

      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        const audioCtx = new AudioContextClass();
        const now = audioCtx.currentTime;

        function tone(freq, start, duration, gainValue) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, now + start);
          gain.gain.setValueAtTime(0.0001, now + start);
          gain.gain.exponentialRampToValueAtTime(gainValue, now + start + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + start + duration);

          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + start);
          osc.stop(now + start + duration + 0.02);
        }

        tone(98, 0.00, 0.22, 0.10);
        tone(147, 0.20, 0.30, 0.12);
        tone(196, 0.42, 0.22, 0.08);
      } catch (error) {
        console.warn("Startup sound blocked", error);
      }
    }

    window.addEventListener("pointerdown", playStartupSoundOnce, { once: true });

    const BASE_SECTIONS = ["Prep", "Sauce", "Bakery", "Cookie"];

    const SECTION_LAYOUT_KEY = "prep_section_layout_v1";
    const SECTION_COLLAPSED_KEY = "prep_section_collapsed_v1";
    function getStoredCustomSections() {

        const saved = localStorage.getItem(key) || localStorage.getItem(CUSTOM_SECTIONS_KEY);

    function compareText(a, b) {
      return String(a || "").localeCompare(String(b || ""), undefined, { sensitivity: "base", numeric: true });
    }
    function getDisplayPriority(item) {
      return item && item.checked ? 0 : 1;
    }

    function compareItemsForDisplay(a, b) {
      const priorityA = getDisplayPriority(a);
      const priorityB = getDisplayPriority(b);

      if (priorityA !== priorityB) return priorityA - priorityB;

      return compareText(a.item, b.item);
    }
    function sortItemsLocal() {
      const sections = getAllSections();
      items.sort((a, b) => {
        const sectionA = sections.indexOf(a.section) === -1 ? 999 : sections.indexOf(a.section);
        const sectionB = sections.indexOf(b.section) === -1 ? 999 : sections.indexOf(b.section);
        if (sectionA !== sectionB) return sectionA - sectionB;
        return compareItemsForDisplay(a, b);
      });
    }
    function loadRealtime() {
      setStatus("Loading...");
      onSnapshot(prepRef, snapshot => {
        items = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
        sortItemsLocal(); updateSectionDropdown(); renderHome(); render(); updateDeleteModeButton(); updateEditModeButton(); updateOfflineBadge(); flushPendingWrites();
        setStatus(navigator.onLine ? "Loaded OK Auto save / real-time sync" : "Offline mode - showing cached data");
      }, error => {
        console.error(error);
        setStatus("Firebase error ERROR Check Firestore Rules");
        document.getElementById("content").innerHTML = `<div class="loading">Cannot connect to Firebase</div>`;
      });
    }
    function render() {
      const content = document.getElementById("content");
      const pageItems = getCurrentPageItems();
      if (!pageItems.length && !getStoredCustomSections().length) { content.innerHTML = `<div class="loading">No items</div>`; return; }

      const q = String(searchQuery || "").trim().toLowerCase();
      const visibleItems = q
        ? pageItems.filter(item => {
            const text = `${item.item || ""} ${item.section || ""} ${item.recipe || ""}`.toLowerCase();
            return text.includes(q);
          })
        : pageItems;

      const groups = {};
      const sections = getAllSections();
      sections.forEach(section => { groups[section] = []; });

      visibleItems.forEach(item => {
        const section = normalizeSectionName(item.section) || "Other";
        if (!groups[section]) groups[section] = [];
        groups[section].push(item);
      });

      Object.keys(groups).forEach(section => { groups[section].sort(compareItemsForDisplay); });

      const halfSections = sections.filter(section => !isFullSection(section));
      const fullSections = sections.filter(section => isFullSection(section));

      const leftSection = halfSections[0] || "";
      const leftHtml = leftSection ? renderBox(leftSection, groups[leftSection] || [], { layout: "half" }) : "";
      const rightHtml = halfSections.slice(1).map(section => renderBox(section, groups[section] || [], { layout: "half" })).join("");
      const fullHtml = fullSections.map(section => renderBox(section, groups[section] || [], { layout: "full", forceShow: true })).join("");

      const emptySearch = q && !visibleItems.length ? `<div class="loading">No search result</div>` : "";
      content.innerHTML = emptySearch || `
        <div class="layout">
          <div class="leftCol">${leftHtml}</div>
          <div class="rightCol">${rightHtml}</div>
        </div>
        ${fullHtml ? `<div class="fullSections">${fullHtml}</div>` : ""}`;
    }

    function renderBox(title, list, options = {}) {

      const forceShow = !!options.forceShow;
      const collapsed = isSectionCollapsed(title) && !String(searchQuery || "").trim();

      if (!list.length && !orderOn && !forceShow) return "";

      const safeTitle = escapeAttr(title);
      let html = `
        <div class="box ${isFull ? "boxFull" : ""} ${collapsed ? "boxCollapsed" : ""}">
          <div class="boxTitle">
            <span class="boxTitleText">${escapeHtml(title)}</span>
            <button class="sectionEyeBtn ${collapsed ? "eyeClosed" : ""}" onclick="toggleSectionCollapse('${safeTitle}', this); event.stopPropagation();" aria-label="${collapsed ? "Show section" : "Hide section"}" title="${collapsed ? "Show section" : "Hide section"}">${collapsed ? "🔻" : "🔺"}</button>
            <span class="sectionTools ${orderOn ? "orderOn" : ""}">
              ${deleteMode ? `<button class="sectionDeleteBtn" onclick="deleteSection('${safeTitle}', this); event.stopPropagation();" aria-label="Delete section" title="Delete section">🗑️</button>` : ""}

    window.deleteSection = async function(section, btn) {
      if (!editMode || !deleteMode) return;

      animateSectionDeletePress(btn);
      await new Promise(resolve => setTimeout(resolve, 160));

      const clean = normalizeSectionName(section);
      const sectionItems = getCurrentPageItems().filter(item => normalizeSectionName(item.section) === clean);

      const ok = confirm(`Delete section "${clean}"?\n\nThis will delete ${sectionItems.length} item(s) in this section.`);
      if (!ok) {
        setStatus(`Delete section cancelled: ${clean}`);
        return;
      }

      items = items.filter(item => !((item.pageId || DEFAULT_PAGE_ID) === currentPageId && normalizeSectionName(item.section) === clean));

      const customSections = getStoredCustomSections().filter(sectionName => normalizeSectionName(sectionName) !== clean);
      saveCustomSections(customSections);

      const layoutConfig = getSectionLayoutConfig();
      delete layoutConfig[clean];
      saveSectionLayoutConfig(layoutConfig);

      const collapsedConfig = getSectionCollapsedConfig();
      delete collapsedConfig[clean];
      saveSectionCollapsedConfig(collapsedConfig);

      const orderConfig = getSectionOrderConfig();
      delete orderConfig[clean];
      saveSectionOrderConfig(orderConfig);

      updateSectionDropdown();
      render();

      if (!sectionItems.length) {
        setStatus(`Section removed: ${clean}`);
        return;
      }

      if (!navigator.onLine) {
        sectionItems.forEach(item => queueWrite({ type: "delete", id: item.id }));
        setStatus(`Section deleted locally: ${clean}. Will sync ${sectionItems.length} item(s) later.`);
        return;
      }

      try {
        await Promise.all(sectionItems.map(item => deleteDoc(doc(db, "prepItems", item.id))));
        setStatus(`Section deleted OK: ${clean}`);
      } catch (error) {
        console.error(error);
        sectionItems.forEach(item => queueWrite({ type: "delete", id: item.id }));
        setStatus(`Section deleted locally: ${clean}. Sync later.`);
      }
    };

    window.toggleSectionCollapse = function(section, btn) {

        const config = getSectionCollapsedConfig();
        config[clean] = !config[clean];
        saveSectionCollapsedConfig(config);

        const box = btn ? btn.closest(".box") : null;
        const rows = box ? box.querySelector(".sectionRows") : null;

        if (rows) {
          rows.classList.toggle("hidden", !!config[clean]);
          box.classList.toggle("boxCollapsed", !!config[clean]);

          render();

        if (btn) {

          btn.setAttribute("aria-label", config[clean] ? "Show section" : "Hide section");
          btn.setAttribute("title", config[clean] ? "Show section" : "Hide section");

    window.toggleCheck = async function(id) {

    function animateColourChange(id, colour) {

      const row = document.querySelector(`[data-row-id="${CSS.escape(id)}"]`);
      if (!row) return;
      row.classList.remove(
        "colour-slide-red",

        "colour-slide-yellow",
        "colour-slide-blue",
        "colour-slide-none"
      );

    window.changeColor = async function(id, color) {
      if (isSaving) return;
      const item = items.find(x => x.id === id);
      if (!item) return;
      const nextColor = color || "none";
      animateColourChange(id, nextColor);
      setTimeout(() => {
        item.color = nextColor;
        render();
        saveItemChange(item);
      }, 260);

    async function saveItemChange(item) {
      setSavingState(true);
      setStatus(navigator.onLine ? "Saving..." : "Offline saving locally...");
      try {
        await savePatch(item.id, {
          checked: !!item.checked,
          color: item.color || "none"
        });
      } finally {
        setSavingState(false);
      }
    }
    let orderQtyTimers = {};
    window.saveOrderQty = function(id, value) {
      const item = items.find(x => x.id === id); if (!item) return;

      const clean = String(value || "").replace(/[^0-9]/g, "").slice(0, 4);
      item.orderQty = clean;

      const input = document.querySelector(`input[data-order-input="${CSS.escape(id)}"]`);
      if (input && input.value !== clean) input.value = clean;

      if (orderQtyTimers[id]) clearTimeout(orderQtyTimers[id]);

      // iPhone fix: do not save/re-render while the number input is focused.
      // Saving while focused can trigger Firestore snapshot -> render -> keyboard auto hides.
      orderQtyTimers[id] = setTimeout(() => {
        const active = document.activeElement;
        const stillTyping = active && active.matches && active.matches(`input[data-order-input="${CSS.escape(id)}"]`);

        if (stillTyping) return;

        savePatch(id, { orderQty: clean }, { silent: true });
      }, 900);
    };

    window.commitOrderQty = function(id) {
      const item = items.find(x => x.id === id); if (!item) return;
      const clean = String(item.orderQty || "").replace(/[^0-9]/g, "").slice(0, 4);

      if (orderQtyTimers[id]) {
        clearTimeout(orderQtyTimers[id]);
        delete orderQtyTimers[id];
      }

      savePatch(id, { orderQty: clean }, { silent: true });
    };
    function commitFocusedOrderQty() {
      const active = document.activeElement;
      if (!active || !active.matches || !active.matches("input[data-order-input]")) return;

      const id = active.getAttribute("data-order-input");
      if (id) commitOrderQty(id);
    }

    window.toggleSectionOrderMode = function(section) {
      if (!editMode) return;
      const clean = normalizeSectionName(section);
      const config = getSectionOrderConfig();
      config[clean] = !config[clean];
      saveSectionOrderConfig(config);
      render();
      setStatus(config[clean] ? `Order number ON: ${clean}` : `Order number OFF: ${clean}`);
    };
    function getPickupLines(sectionFilter = "") {
      const config = getSectionOrderConfig();
      return items
        .filter(item => {
          const section = normalizeSectionName(item.section);
          if (sectionFilter && section !== normalizeSectionName(sectionFilter)) return false;
          if (!config[section]) return false;
          return String(item.orderQty || "").trim();
        })
        .sort((a, b) => {
          const sectionCompare = compareText(a.section, b.section);
          if (sectionFilter || sectionCompare === 0) return compareItemsForDisplay(a, b);
          return sectionCompare;
        })
        .map(item => `${item.item} x ${item.orderQty}`);
    }
    async function copyTextToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        const ok = document.execCommand("copy");
        textarea.remove();
        return ok;
      }
    }

    window.openPhotoViewer = function() {

      if (!item) return;
      activePhotoItemId = item.id;

      } else {

      }
      document.getElementById("photoModal").classList.add("show");
    };
    window.photoOverlayClose = function(event) {
      if (event.target && event.target.id === "photoModal") closePhotoViewer();
    };
    window.closePhotoViewer = function() {
      document.getElementById("photoModal").classList.remove("show");
      activePhotoItemId = null;
    };
    window.choosePhoto = function() {
      if (!editMode || !activeRecipeItemId) return;
      const input = document.getElementById("photoInput");
      if (!input) return;
      input.value = "";
      input.click();
    };
    window.handlePhotoSelected = async function(event) {
      if (!editMode || !activeRecipeItemId) return;
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      if (!file.type || !file.type.startsWith("image/")) {
        setStatus("Please choose an image file");
        return;
      }
      setStatus("Compressing photo...");
      try {
        const photoData = await compressImageFile(file);
        if (photoData.length > 850000) {
          setStatus("Photo too large after compression ERROR");
          alert("Photo is still too large. Please choose a smaller image.");
          return;
        }
        setStatus("Saving photo...");
        await savePatch(activeRecipeItemId, {
          photoData,
          photoName: file.name || "photo.jpg",
          photoUpdatedAtClient: Date.now()
        });
        const item = items.find(x => x.id === activeRecipeItemId);
        if (item) {
          item.photoData = photoData;
          item.photoName = file.name || "photo.jpg";
        }
        updatePhotoButtons(item);
        render();
        setStatus("Photo saved OK");
      } catch (error) {
        console.error(error);
        setStatus("Photo save failed ERROR");
        alert("Photo upload failed. Try a smaller photo.");
      }
    };
    function compressImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxSize = 850;
            let width = img.width;
            let height = img.height;
            if (width > height && width > maxSize) {
              height = Math.round(height * (maxSize / width));
              width = maxSize;
            } else if (height >= width && height > maxSize) {
              width = Math.round(width * (maxSize / height));
              height = maxSize;
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            let quality = 0.62;
            let dataUrl = canvas.toDataURL("image/jpeg", quality);
            while (dataUrl.length > 650000 && quality > 0.35) {
              quality -= 0.08;
              dataUrl = canvas.toDataURL("image/jpeg", quality);
            }
            resolve(dataUrl);
          };
          img.onerror = () => reject(new Error("Could not load image"));
          img.src = reader.result;
        };
        reader.onerror = () => reject(new Error("Could not read image"));
        reader.readAsDataURL(file);
      });
    }
    window.deletePhoto = async function() {
      if (!editMode || !activeRecipeItemId) return;
      const item = items.find(x => x.id === activeRecipeItemId);

      setStatus("Deleting photo...");
      try {

          photoData: "",

          photoUpdatedAtClient: Date.now()
        });

        delete item.photoName;
        updatePhotoButtons(item);
        closePhotoViewer();
        render();
        setStatus("Photo deleted OK");
      } catch (error) {
        console.error(error);
        setStatus("Photo delete failed ERROR");
      }

    function renderRecipePreview(recipeText) {
      const lines = recipeLines(recipeText);
      if (!lines.length) {
        document.getElementById("modalBody").innerHTML =
          `<div class="recipeTextView"><span class="recipeEmpty">No recipe/note for this item yet</span></div>`;
        return;
      }
      const item = items.find(x => x.id === activeRecipeItemId);
      const checks = getRecipeChecks(item);
      const rows = lines.map((line, index) => {
        const key = String(index);
        const hasNumber = /-?\d+(?:\.\d+)?/.test(line);
        const checked = hasNumber && !!checks[key];
        if (!hasNumber) {
          return `
            <div class="recipeCheckLine noCheck">
              <span class="recipeCheckSpacer"></span>
              <span class="recipeCheckText">${escapeHtml(line)}</span>
            </div>
          `;
        }
        return `
          <label class="recipeCheckLine ${checked ? "done" : ""}">
            <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleRecipeCheck('${key}', this.checked)">
            <span class="recipeCheckText">${escapeHtml(line)}</span>
          </label>
        `;
      }).join("");
      document.getElementById("modalBody").innerHTML = `<div class="recipeCheckList">${rows}</div>`;
    }
    function recipeLines(recipeText) {
      return String(recipeText || "")
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);
    }
    function getRecipeChecks(item) {
      if (!item || !item.recipeChecks || typeof item.recipeChecks !== "object") return {};
      return { ...item.recipeChecks };
    }
    window.toggleRecipeCheck = function(key, checked) {
      if (editMode || !activeRecipeItemId) return;
      const item = items.find(x => x.id === activeRecipeItemId);
      if (!item) return;
      const checks = getRecipeChecks(item);
      checks[key] = checked;
      item.recipeChecks = checks;
      renderRecipePreview(currentRecipePreview || originalRecipePreview);
      scheduleRecipeCheckSave(item.id, checks);
    };
    function scheduleRecipeCheckSave(id, checks) {
      if (recipeCheckSaveTimer) clearTimeout(recipeCheckSaveTimer);
      setStatus("Checklist saving...");
      recipeCheckSaveTimer = setTimeout(async () => {
        try {
          await savePatch(id, { recipeChecks: checks }, { silent: true });
          setStatus("Checklist saved OK");
        } catch (error) {
          console.error(error);
          setStatus("Checklist save failed ERROR");
        }
      }, 300);
    }
    function setMultiplierButtonState(value) {
      activeMultiplierValue = value || 1;
      const buttons = [
        document.getElementById("multiplierBtn1"),
        document.getElementById("multiplierBtn2"),
        document.getElementById("multiplierBtn3"),
        document.getElementById("multiplierBtnCustom")
      ].filter(Boolean);
      buttons.forEach(btn => btn.classList.remove("multiplierActive"));
      let targetId = "multiplierBtn1";
      if (activeMultiplierValue === 2) targetId = "multiplierBtn2";
      else if (activeMultiplierValue === 3) targetId = "multiplierBtn3";
      else if (activeMultiplierValue === "custom") targetId = "multiplierBtnCustom";
      const target = document.getElementById(targetId);
      if (target) target.classList.add("multiplierActive");
    }
    function resetMultiplierPreviewOnly() {

        document.getElementById("modalTitle").textContent = newName;
        sortItemsLocal();
        render();
        setStatus("Renamed OK");
      } catch (error) {
        console.error(error);
        setStatus("Rename failed ERROR");
      }
    };
    function populateMoveSectionSelect(currentSection) {
      const select = document.getElementById("moveSectionSelectBtn");
      if (!select) return;
      const sections = getAllSections().filter(section => section !== currentSection);
      if (!sections.length) {
        select.innerHTML = `<option value="">NO SECTION</option>`;
        select.disabled = true;
        return;
      }
      select.disabled = false;
      select.innerHTML = `
        <option value="">MOVE SECTION</option>
        ${sections.map(section => `<option value="${escapeAttr(section)}">${escapeHtml(section)}</option>`).join("")}
      `;
      select.value = "";
    }
    window.moveActiveItemSectionFromSelect = async function(select) {
      if (!editMode || !activeRecipeItemId) {
        if (select) select.value = "";
        return;
      }
      const item = items.find(x => x.id === activeRecipeItemId);
      if (!item) {
        if (select) select.value = "";
        return;
      }
      const newSection = normalizeSectionName(select.value);
      if (!newSection) return;
      if (String(newSection) === String(item.section)) {
        setStatus("Already in this section");
        select.value = "";
        return;
      }
      if (items.some(x =>
        x.id !== activeRecipeItemId &&
        String(x.section).toLowerCase() === newSection.toLowerCase() &&
        String(x.item).toLowerCase() === String(item.item).toLowerCase()
      )) {
        setStatus("Move failed ERROR item already exists in that section");
        select.value = "";
        return;
      }
      setStatus("Moving section...");
      try {
        item.section = newSection;
        await savePatch(activeRecipeItemId, { section: newSection });
        sortItemsLocal();
        renderHome();
    setTimeout(renderHome, 150);
    setTimeout(renderHome, 800);
    updateSectionDropdown();
    setTimeout(updateOfflineBadge, 200);
        render();
        populateMoveSectionSelect(newSection);
        document.getElementById("modalSub").textContent = "EDIT MODE ON - moved to " + newSection;
        setStatus("Moved to " + newSection + " OK");
      } catch (error) {
        console.error(error);
        setStatus("Move failed ERROR");
      } finally {
        select.value = "";
      }
    };
    window.multiplyRecipeCustom = function() {
      if (editMode) return;
      if (activeMultiplierValue === "custom") {
        resetMultiplierPreviewOnly();
        return;
      }
      const value = prompt("Multiply by:", "1.5");
      const multiplier = Number(value);
      if (!Number.isFinite(multiplier) || multiplier <= 0) {
        setStatus("Multiplier cancelled");
        return;
      }
      currentRecipePreview = multiplyNumbersInText(originalRecipePreview, multiplier);
      renderRecipePreview(currentRecipePreview);
      setMultiplierButtonState("custom");
      document.getElementById("modalSub").textContent = "";
      setStatus(`Recipe preview ×${formatNumber(multiplier)} - not saved`);
    };
    function multiplyNumbersInText(text, multiplier) {
      const source = String(text || "");
      return source.replace(/-?\d+(?:\.\d+)?/g, (match, offset) => {
        const after = source.slice(offset + match.length);
        if (/^\s*-\s*(?:c|grams)\b/i.test(after)) return match;
        const original = Number(match);
        if (!Number.isFinite(original)) return match;
        const result = original * multiplier;
        return formatNumber(result);
      });
    }
    function formatNumber(value) {
      if (Number.isInteger(value)) return String(value);
      const rounded = Math.round(value * 1000) / 1000;
      return String(rounded).replace(/\.?0+$/, "");
    }
    window.overlayClose = function(event) {
      if (event.target && event.target.id === "recipeModal") closeRecipeModal();
    };
    window.closeRecipeModal = function() {
      if (recipeSaveTimer) { clearTimeout(recipeSaveTimer); recipeSaveTimer = null; }
      if (recipeCheckSaveTimer) { clearTimeout(recipeCheckSaveTimer); recipeCheckSaveTimer = null; }
      const tools = document.getElementById("recipeMultiplierTools");
      const renameBtn = document.getElementById("renameRecipeBtn");
      const moveSelect = document.getElementById("moveSectionSelectBtn");
      const photoViewBtn = document.getElementById("photoViewBtn");
      const photoUploadBtn = document.getElementById("photoUploadBtn");
      const photoDeleteBtn = document.getElementById("photoDeleteBtn");
      const photoInput = document.getElementById("photoInput");
      if (tools) tools.classList.remove("show");
      if (renameBtn) renameBtn.classList.remove("show");
      if (moveSelect) {
        moveSelect.classList.remove("show");
        moveSelect.value = "";
      }
      if (photoViewBtn) photoViewBtn.classList.remove("show");
      if (photoUploadBtn) photoUploadBtn.classList.remove("show");
      if (photoDeleteBtn) photoDeleteBtn.classList.remove("show");
      if (photoInput) photoInput.value = "";
      closePhotoViewer();
      document.getElementById("recipeModal").classList.remove("show");
      activeRecipeItemId = null;
      originalRecipePreview = "";
      currentRecipePreview = "";
    };
    function scheduleRecipeSave(value) {
      if (!activeRecipeItemId) return;
      const item = items.find(x => x.id === activeRecipeItemId); if (item) item.recipe = value;
      if (recipeSaveTimer) clearTimeout(recipeSaveTimer);
      setStatus("Recipe saving...");
      recipeSaveTimer = setTimeout(() => saveRecipeNow(activeRecipeItemId, value), 550);
    }
    async function saveRecipeNow(id, value) {
      try {
        await savePatch(id, { recipe: value });
        setStatus(navigator.onLine ? "Recipe saved OK" : "Recipe saved offline - will sync later");
      } catch (error) {
        console.error(error);
        setStatus("Recipe save failed ERROR");
      }
    }
    window.confirmDelete = async function(id, itemName) {
      if (!deleteMode || isSaving) return;
      const ok = confirm("Delete this item?\n\n" + itemName); if (!ok) return;
      setSavingState(true); setStatus(navigator.onLine ? "Deleting " + itemName + "..." : "Offline delete queued...");
      try { await deleteItemOfflineSafe(id); }
      catch (error) { console.error(error); setStatus("Delete failed ERROR"); }
      finally { setSavingState(false); }
    };
    window.openAddModal = function() {
      if (!editMode) return;
      updateSectionDropdown();
      const modal = document.getElementById("addModal");
      const input = document.getElementById("popupNewItem");
      const layoutSelect = document.getElementById("popupSectionLayout");
      if (modal) modal.classList.add("show");
      setTimeout(() => {
        if (layoutSelect) layoutSelect.value = "half";
        if (input) {
          input.value = "";
          input.focus();
        }
      }, 0);
    };
    window.closeAddModal = function() {
      const modal = document.getElementById("addModal");
      if (modal) modal.classList.remove("show");
    };
    window.addOverlayClose = function(event) {
      if (event.target && event.target.id === "addModal") closeAddModal();
    };
    window.addNewItemFromPopup = async function() {
      const sectionEl = document.getElementById("popupNewSection");
      const itemEl = document.getElementById("popupNewItem");
      const section = sectionEl ? sectionEl.value : "";
      const itemName = itemEl ? itemEl.value.trim() : "";
      if (!itemName) {
        setStatus("Enter an item name first");
        if (itemEl) itemEl.focus();
        return;
      }
      await addItemCore(section, itemName, true);
    };
    async function addItemCore(section, itemName, fromPopup) {
      section = normalizeSectionName(section);
      itemName = String(itemName || "").trim();
      if (!section) { setStatus("Select a section first"); return; }
      if (!itemName) { setStatus("Enter an item name first"); return; }
      const id = makeId(section, itemName);
      if (items.some(x => x.id === id)) {
        setStatus("Item already exists ERROR");
        return;
      }
      setSavingState(true);
      setStatus(navigator.onLine ? "Adding item..." : "Offline adding item locally...");
      try {
        await createItemOfflineSafe(id, {
          id,
          section,
          item: itemName,
          checked: false,
          color: "none",
          recipe: "",
          recipeChecks: {},
          orderQty: "",
          pinned: false,
          pinnedAt: 0,
          sort: 9999,
          pageId: currentPageId || DEFAULT_PAGE_ID
        });
        const popupInput = document.getElementById("popupNewItem");
        const inlineInput = document.getElementById("newItem");
        if (popupInput) popupInput.value = "";
        if (inlineInput) inlineInput.value = "";
        if (fromPopup) closeAddModal();
        setStatus(navigator.onLine ? "Added OK" : "Added offline - will sync later");
      } finally {
        setSavingState(false);
      }
    }
    window.toggleAddPanel = function() {
      const panel = document.getElementById("addPanel");
      panel.style.display = panel.style.display === "none" ? "grid" : "none";
    };
    window.openSectionModal = function() {
      if (!editMode) return;
      const modal = document.getElementById("sectionModal");
      const input = document.getElementById("popupSectionName");
      if (modal) modal.classList.add("show");
      setTimeout(() => {
        if (input) {
          input.value = "";
          input.focus();
        }
      }, 0);
    };
    window.closeSectionModal = function() {
      const modal = document.getElementById("sectionModal");
      if (modal) modal.classList.remove("show");
    };
    window.sectionOverlayClose = function(event) {
      if (event.target && event.target.id === "sectionModal") closeSectionModal();
    };
    window.addSectionFromPopup = function() {
      const input = document.getElementById("popupSectionName");
      const layoutSelect = document.getElementById("popupSectionLayout");
      const name = normalizeSectionName(input ? input.value : "");
      const layout = layoutSelect ? layoutSelect.value : "half";
      addSectionCore(name, true, layout);
    };
    function addSectionCore(name, fromPopup, layout = "half") {
      name = normalizeSectionName(name);
      if (!name) {
        setStatus("Section name required");
        const input = document.getElementById("popupSectionName");
        if (fromPopup && input) input.focus();
        return;
      }
      const sections = getAllSections();
      if (sections.includes(name)) {
        const layoutConfig = getSectionLayoutConfig();
        layoutConfig[name] = layout === "full" ? "full" : "half";
        saveSectionLayoutConfig(layoutConfig);
        render();

        setStatus("Section layout updated " + name + " = " + layout.toUpperCase());
        const inlineSelect = document.getElementById("newSection");
        const popupSelect = document.getElementById("popupNewSection");
        if (inlineSelect) inlineSelect.value = name;
        if (popupSelect) popupSelect.value = name;
        if (fromPopup) closeSectionModal();
        return;
      }
      const custom = getStoredCustomSections();
      custom.push(name);
      custom.sort(compareText);
      saveCustomSections(custom);

      const layoutConfig = getSectionLayoutConfig();
      layoutConfig[name] = layout === "full" ? "full" : "half";
      saveSectionLayoutConfig(layoutConfig);

      updateSectionDropdown();
      const inlineSelect = document.getElementById("newSection");
      const popupSelect = document.getElementById("popupNewSection");
      if (inlineSelect) inlineSelect.value = name;
      if (popupSelect) popupSelect.value = name;
      if (fromPopup) closeSectionModal();
      setStatus("Section added OK " + name + " (" + layout.toUpperCase() + ")");
    };
    window.addSection = function() {
      const name = normalizeSectionName(prompt("New section name:"));
      addSectionCore(name, false, "half");
    };
    window.addNewItem = async function() {
      const section = normalizeSectionName(document.getElementById("newSection").value);
      const itemName = document.getElementById("newItem").value.trim();
      await addItemCore(section, itemName, false);
    };
    function makeId(section, itemName) {
      const slug = String(itemName || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
      const sec = String(section || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
      return sec + "-" + slug;
    }
    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function escapeAttr(str) {
      return String(str || "")
        .replaceAll("\\", "\\\\")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    updateSectionDropdown();
    const popupInputReady = setInterval(() => {
      const popupInput = document.getElementById("popupNewItem");
      if (!popupInput) return;
      clearInterval(popupInputReady);
      popupInput.addEventListener("keydown", event => {
        if (event.key === "Enter") addNewItemFromPopup();
      });
    }, 100);
    const popupSectionReady = setInterval(() => {
      const sectionInput = document.getElementById("popupSectionName");
      if (!sectionInput) return;
      clearInterval(popupSectionReady);
      sectionInput.addEventListener("keydown", event => {
        if (event.key === "Enter") addSectionFromPopup();
      });
    }, 100);
    window.addEventListener("load", () => {
      const splash = document.getElementById("appSplash");
      const video = document.getElementById("splashVideo");

      document.body.classList.add("appReady");

      if (!splash) {
        document.documentElement.classList.remove("splashLock");
        document.body.classList.remove("splashLock");
        return;
      }

      let closed = false;
      let started = false;
      let safetyTimer = null;

      function closeSplash() {
        if (closed) return;
        closed = true;

        if (safetyTimer) clearTimeout(safetyTimer);

        splash.classList.add("fadeOut");

        setTimeout(() => {
          splash.classList.add("hide");
          splash.remove();
          document.documentElement.classList.remove("splashLock");
          document.body.classList.remove("splashLock");
        }, 900);
      }

      function startVideo() {
        if (!video || started) return;
        started = true;

        video.muted = true;
        video.defaultMuted = true;
        video.playsInline = true;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.preload = "auto";
        video.playbackRate = 1;

        try {
          video.currentTime = 0;
        } catch (error) {}

        const playPromise = video.play();

        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {
            setTimeout(closeSplash, 1800);
          });
        }
      }

      if (video) {
        video.addEventListener("canplay", startVideo, { once: true });
        video.addEventListener("loadeddata", startVideo, { once: true });

        video.addEventListener("ended", () => {
          setTimeout(closeSplash, 760);
        }, { once: true });

        video.addEventListener("error", () => {
          setTimeout(closeSplash, 1200);
        }, { once: true });

        startVideo();

        // Emergency fallback only. It is longer than the full clip and will not cut normal playback.
        safetyTimer = setTimeout(() => {
          const d = Number(video.duration);
          if (Number.isFinite(d) && d > 0 && video.currentTime < d - 0.2) {
            setTimeout(closeSplash, 1200);
          } else {
            closeSplash();
          }
        }, 9566);
      } else {
        setTimeout(closeSplash, 1800);
      }
    });
    loadHomeConfigRealtime();
    loadRealtime();
  </script>
</body>

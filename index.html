<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      overflow-x: hidden;
    }

    body {
      padding: 4px;
    }

    .page {
      width: 100%;
      min-width: 0;
      max-width: none;
      margin: 0 auto;
      background: #fff;
    }

    .title {
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 7px;
      line-height: 1;
      margin: 2px 0 8px;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, .96);
      border: 2px solid #000;
      padding: 5px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      align-items: center;
    }

    .status {
      grid-column: 1 / -1;
      font-size: 11px;
      font-weight: 700;
      color: #111;
      white-space: normal;
      line-height: 1.2;
    }

    button {
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-weight: 900;
      padding: 7px 4px;
      font-size: 11px;
      cursor: pointer;
    }

    button:active {
      transform: scale(.98);
    }

    #updateBtn.saving {
      background: #f59e0b;
      color: #000;
      border-color: #000;
    }

    #deleteModeBtn.deleteOn {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .addPanel {
      display: grid;
      grid-template-columns: 72px 1fr 82px;
      gap: 5px;
      margin-bottom: 8px;
      border: 2px solid #000;
      padding: 5px;
    }

    select,
    input {
      border: 2px solid #000;
      padding: 6px 4px;
      font-size: 11px;
      font-weight: 700;
      background: #fff;
      color: #000;
      min-width: 0;
    }

    #newSection {
      border-radius: 18px;
      padding-left: 7px;
      padding-right: 7px;
    }

    .layout {
      display: grid !important;
      grid-template-columns: 1fr 1fr !important;
      gap: 6px;
      align-items: start;
      width: 100%;
    }

    .leftCol,
    .rightCol {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .box {
      border: 2px solid #000;
      background: #fff;
      width: 100%;
      min-width: 0;
    }

    .boxTitle {
      text-align: center;
      font-size: 21px;
      font-weight: 900;
      padding: 3px 4px;
      border-bottom: 2px solid #000;
      line-height: 1.1;
    }

    .row {
      display: grid;
      grid-template-columns: 28px 1fr 55px;
      min-height: 31px;
      border-bottom: 1.5px solid #000;
      background: #fff;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .checkCell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1.5px solid #000;
      cursor: pointer;
      min-height: 31px;
      padding: 2px;
    }

    .itemName {
      display: flex;
      align-items: center;
      padding: 3px 5px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.05;
      cursor: pointer;
      word-break: break-word;
      min-width: 0;
    }

    .colorCell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1.5px solid #000;
      min-height: 31px;
      padding: 2px;
    }

    .colorSelect {
      width: 50px;
      height: 24px;
      border: 1.5px solid #000;
      background: #fff;
      color: #000;
      padding: 0 1px;
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
      border-radius: 14px;
    }

    .deleteBtn {
      width: 50px;
      height: 24px;
      border: 1.5px solid #000;
      background: #ff0000;
      color: #fff;
      padding: 0 1px;
      font-size: 9px;
      font-weight: 900;
      cursor: pointer;
      border-radius: 14px;
    }

    .customCheck {
      width: 20px;
      height: 20px;
      border: 2px solid #000;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      color: transparent;
      user-select: none;
    }

    .customCheck.checked {
      color: #ff0000;
    }

    .row.row-red {
      background: rgba(255, 0, 0, .15);
    }

    .row.row-green {
      background: rgba(0, 180, 0, .14);
    }

    .row.row-yellow {
      background: rgba(255, 210, 0, .24);
    }

    .row.row-blue {
      background: rgba(0, 145, 255, .14);
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      font-weight: 900;
    }

    @media (min-width: 780px) {
      body {
        padding: 12px;
      }

      .page {
        max-width: 1080px;
      }

      .title {
        font-size: 58px;
        letter-spacing: 12px;
        margin: 4px 0 14px;
      }

      .controls {
        padding: 8px;
        margin-bottom: 12px;
        grid-template-columns: 1fr auto auto auto auto;
        gap: 8px;
      }

      .status {
        grid-column: auto;
        font-size: 14px;
        white-space: nowrap;
      }

      button {
        padding: 9px 12px;
        font-size: 14px;
      }

      .addPanel {
        grid-template-columns: 130px 1fr auto;
        gap: 8px;
        margin-bottom: 12px;
        padding: 8px;
      }

      select,
      input {
        padding: 9px;
        font-size: 15px;
      }

      .layout {
        gap: 20px;
      }

      .leftCol,
      .rightCol {
        gap: 22px;
      }

      .boxTitle {
        font-size: 32px;
        padding: 4px 8px;
      }

      .row {
        grid-template-columns: 58px 1fr 106px;
        min-height: 40px;
      }

      .checkCell,
      .colorCell {
        min-height: 40px;
        padding: 4px;
      }

      .itemName {
        font-size: 20px;
        padding: 4px 14px;
        line-height: 1.1;
      }

      .colorSelect,
      .deleteBtn {
        width: 96px;
        height: 32px;
        font-size: 13px;
        padding: 1px 2px;
      }

      .customCheck {
        width: 28px;
        height: 28px;
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="title">PREP LIST</div>

    <div class="controls">
      <div id="status" class="status">Loading...</div>
      <button id="updateBtn" onclick="manualSave()">UPDATE</button>
      <button onclick="refreshNow()">REFRESH</button>
      <button onclick="toggleAddPanel()">ADD</button>
      <button onclick="addSection()">ADD SECTION</button>
      <button id="deleteModeBtn" onclick="toggleDeleteMode()">DELETE MODE</button>
    </div>

    <div id="addPanel" class="addPanel">
      <select id="newSection"></select>

      <input id="newItem" placeholder="New item name">

      <button onclick="addNewItem()">ADD ITEM</button>
    </div>

    <div id="content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      updateDoc,
      deleteDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzdxT4kocIK04UJhhbMQjpVw4Wtim5yVg",
      authDomain: "prep-5ada7.firebaseapp.com",
      projectId: "prep-5ada7",
      storageBucket: "prep-5ada7.firebasestorage.app",
      messagingSenderId: "678949496330",
      appId: "1:678949496330:web:037d9332743ec51638e1f3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const prepRef = collection(db, "prepItems");

    let items = [];
    let deleteMode = false;
    let isSaving = false;

    const BASE_SECTIONS = ["Prep", "Sauce", "Bakery", "Cookie"];
    const CUSTOM_SECTIONS_KEY = "prep_custom_sections_v1";

    function getStoredCustomSections() {
      try {
        const saved = localStorage.getItem(CUSTOM_SECTIONS_KEY);
        const parsed = saved ? JSON.parse(saved) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveCustomSections(sections) {
      localStorage.setItem(CUSTOM_SECTIONS_KEY, JSON.stringify(sections));
    }

    function normalizeSectionName(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, " ");
    }

    function getAllSections() {
      const fromItems = items
        .map(item => normalizeSectionName(item.section))
        .filter(Boolean);

      const combined = [
        ...BASE_SECTIONS,
        ...getStoredCustomSections(),
        ...fromItems
      ];

      return Array.from(new Set(combined));
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function setSavingState(value) {
      isSaving = value;
      const btn = document.getElementById("updateBtn");

      if (value) {
        btn.classList.add("saving");
        btn.textContent = "SAVING";
      } else {
        btn.classList.remove("saving");
        btn.textContent = "UPDATE";
      }
    }

    function updateSectionDropdown() {
      const select = document.getElementById("newSection");
      const current = select.value;
      const sections = getAllSections();

      select.innerHTML = sections.map(section => {
        const safe = escapeAttr(section);
        return `<option value="${safe}">${escapeHtml(section)}</option>`;
      }).join("");

      if (sections.includes(current)) {
        select.value = current;
      }
    }

    function updateDeleteModeButton() {
      const btn = document.getElementById("deleteModeBtn");

      if (deleteMode) {
        btn.classList.add("deleteOn");
        btn.textContent = "DELETE ON";
      } else {
        btn.classList.remove("deleteOn");
        btn.textContent = "DELETE MODE";
      }
    }

    function sortItemsLocal() {
      const sections = getAllSections();

      items.sort((a, b) => {
        const sa = sections.indexOf(a.section);
        const sb = sections.indexOf(b.section);

        const sectionA = sa === -1 ? 999 : sa;
        const sectionB = sb === -1 ? 999 : sb;

        if (sectionA !== sectionB) return sectionA - sectionB;

        const sortA = Number(a.sort || 9999);
        const sortB = Number(b.sort || 9999);

        if (sortA !== sortB) return sortA - sortB;

        return String(a.item || "").localeCompare(String(b.item || ""));
      });
    }

    function loadRealtime() {
      setStatus("Loading...");

      onSnapshot(
        prepRef,
        snapshot => {
          items = snapshot.docs.map(docSnap => ({
            id: docSnap.id,
            ...docSnap.data()
          }));

          sortItemsLocal();
          updateSectionDropdown();
          render();
          updateDeleteModeButton();

          setStatus("Loaded ✅ Auto save / real-time sync");
        },
        error => {
          console.error(error);
          setStatus("Firebase error ❌ Check Firestore Rules");
          document.getElementById("content").innerHTML =
            `<div class="loading">Cannot connect to Firebase</div>`;
        }
      );
    }

    function render() {
      const content = document.getElementById("content");

      if (!items.length) {
        content.innerHTML = `<div class="loading">No items</div>`;
        return;
      }

      const groups = {};
      const sections = getAllSections();

      sections.forEach(section => {
        groups[section] = [];
      });

      items.forEach(item => {
        const section = normalizeSectionName(item.section) || "Other";
        if (!groups[section]) groups[section] = [];
        groups[section].push(item);
      });

      const leftSection = sections[0] || "Prep";
      const leftHtml = renderBox(leftSection, groups[leftSection] || []);

      const rightHtml = sections
        .slice(1)
        .map(section => renderBox(section, groups[section] || []))
        .join("");

      content.innerHTML = `
        <div class="layout">
          <div class="leftCol">${leftHtml}</div>
          <div class="rightCol">${rightHtml}</div>
        </div>
      `;
    }

    function renderBox(title, list) {
      if (!list.length) return "";

      let html = `
        <div class="box">
          <div class="boxTitle">${escapeHtml(title)}</div>
      `;

      list.forEach(item => {
        const checkedClass = item.checked ? "checked" : "";
        const rowColor = item.color && item.color !== "none" ? `row-${item.color}` : "";
        const safeId = escapeAttr(item.id);
        const safeName = escapeAttr(item.item);

        let rightControl = "";

        if (deleteMode) {
          rightControl = `
            <button class="deleteBtn" onclick="confirmDelete('${safeId}', '${safeName}'); event.stopPropagation();">
              DELETE
            </button>
          `;
        } else {
          rightControl = `
            <select class="colorSelect" onchange="changeColor('${safeId}', this.value)" onclick="event.stopPropagation()">
              <option value="none" ${item.color === "none" ? "selected" : ""}>None</option>
              <option value="red" ${item.color === "red" ? "selected" : ""}>Red</option>
              <option value="green" ${item.color === "green" ? "selected" : ""}>Green</option>
              <option value="yellow" ${item.color === "yellow" ? "selected" : ""}>Yellow</option>
              <option value="blue" ${item.color === "blue" ? "selected" : ""}>Blue</option>
            </select>
          `;
        }

        html += `
          <div class="row ${rowColor}">
            <div class="checkCell" onclick="toggleCheck('${safeId}')">
              <div class="customCheck ${checkedClass}">✓</div>
            </div>

            <div class="itemName" onclick="toggleCheck('${safeId}')">
              ${escapeHtml(item.item)}
            </div>

            <div class="colorCell">
              ${rightControl}
            </div>
          </div>
        `;
      });

      html += `</div>`;
      return html;
    }

    window.toggleCheck = async function(id) {
      if (deleteMode || isSaving) return;

      const item = items.find(x => x.id === id);
      if (!item) return;

      item.checked = !item.checked;
      render();

      await saveItemChange(item);
    };

    window.changeColor = async function(id, color) {
      if (isSaving) return;

      const item = items.find(x => x.id === id);
      if (!item) return;

      item.color = color || "none";
      render();

      await saveItemChange(item);
    };

    async function saveItemChange(item) {
      setSavingState(true);
      setStatus("Saving...");

      try {
        await updateDoc(doc(db, "prepItems", item.id), {
          checked: !!item.checked,
          color: item.color || "none",
          updatedAt: serverTimestamp()
        });

        setStatus("Saved ✅ Auto save / real-time sync");
      } catch (error) {
        console.error(error);
        setStatus("Save failed ❌");
      } finally {
        setSavingState(false);
      }
    }

    window.manualSave = function() {
      setStatus("Already auto saving ✅");
    };

    window.refreshNow = function() {
      setStatus("Refreshing... real-time already ON ✅");
      updateSectionDropdown();
      render();

      setTimeout(() => {
        setStatus("Loaded ✅ Auto save / real-time sync");
      }, 500);
    };

    window.toggleDeleteMode = function() {
      deleteMode = !deleteMode;
      updateDeleteModeButton();
      render();

      if (deleteMode) {
        setStatus("Delete mode ON — กด DELETE เพื่อลบ item");
      } else {
        setStatus("Delete mode OFF");
      }
    };

    window.confirmDelete = async function(id, itemName) {
      if (!deleteMode || isSaving) return;

      const ok = confirm("Delete this item?\n\n" + itemName);
      if (!ok) return;

      setSavingState(true);
      setStatus("Deleting " + itemName + "...");

      try {
        await deleteDoc(doc(db, "prepItems", id));
        setStatus("Deleted ✅");
      } catch (error) {
        console.error(error);
        setStatus("Delete failed ❌");
      } finally {
        setSavingState(false);
      }
    };

    window.toggleAddPanel = function() {
      const panel = document.getElementById("addPanel");
      panel.style.display = panel.style.display === "none" ? "grid" : "none";
    };

    window.addSection = function() {
      const name = normalizeSectionName(prompt("New section name:"));

      if (!name) {
        setStatus("Section name required");
        return;
      }

      const sections = getAllSections();

      if (sections.includes(name)) {
        setStatus("Section already exists ❌");
        document.getElementById("newSection").value = name;
        return;
      }

      const custom = getStoredCustomSections();
      custom.push(name);
      saveCustomSections(custom);

      updateSectionDropdown();
      document.getElementById("newSection").value = name;

      setStatus("Section added ✅ " + name);
    };

    window.addNewItem = async function() {
      const section = normalizeSectionName(document.getElementById("newSection").value);
      const itemName = document.getElementById("newItem").value.trim();

      if (!section) {
        setStatus("เลือก section ก่อน");
        return;
      }

      if (!itemName) {
        setStatus("ใส่ชื่อ item ก่อน");
        return;
      }

      setSavingState(true);
      setStatus("Adding item...");

      try {
        const id = makeId(section, itemName);

        if (items.some(x => x.id === id)) {
          setStatus("Item already exists ❌");
          setSavingState(false);
          return;
        }

        const sectionItems = items.filter(x => x.section === section);
        const maxSort = sectionItems.reduce((max, x) => {
          return Math.max(max, Number(x.sort || 0));
        }, 0);

        await setDoc(doc(db, "prepItems", id), {
          id,
          section,
          item: itemName,
          checked: false,
          color: "none",
          sort: maxSort + 1,
          updatedAt: serverTimestamp()
        });

        document.getElementById("newItem").value = "";
        setStatus("Added ✅");
      } catch (error) {
        console.error(error);
        setStatus("Add failed ❌");
      } finally {
        setSavingState(false);
      }
    };

    function makeId(section, itemName) {
      const slug = String(itemName || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      const sec = String(section || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      return sec + "-" + slug;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(str) {
      return String(str || "")
        .replaceAll("\\", "\\\\")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    updateSectionDropdown();
    loadRealtime();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 12px;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
    }

    .page {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      background: #fff;
    }

    .title {
      text-align: center;
      font-size: 58px;
      font-weight: 900;
      letter-spacing: 12px;
      line-height: 1;
      margin: 4px 0 14px;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, .96);
      border: 2px solid #000;
      padding: 8px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 8px;
      align-items: center;
    }

    .status {
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    button {
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-weight: 900;
      padding: 9px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button:active {
      transform: scale(.98);
    }

    #updateBtn {
      background: #00b300;
      color: #fff;
      border-color: #00b300;
    }

    #updateBtn.saving {
      background: #f59e0b;
      color: #000;
      border-color: #000;
    }

    #deleteModeBtn.deleteOn {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .addPanel {
      display: none;
      grid-template-columns: 120px 1fr auto;
      gap: 8px;
      margin-bottom: 12px;
      border: 2px solid #000;
      padding: 8px;
    }

    select,
    input {
      border: 2px solid #000;
      padding: 9px;
      font-size: 15px;
      font-weight: 700;
      background: #fff;
      color: #000;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .leftCol,
    .rightCol {
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .box {
      border: 2px solid #000;
      background: #fff;
    }

    .boxTitle {
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      padding: 4px 8px;
      border-bottom: 2px solid #000;
      line-height: 1.1;
    }

    .row {
      display: grid;
      grid-template-columns: 58px 1fr 106px;
      min-height: 40px;
      border-bottom: 1.5px solid #000;
      background: #fff;
    }

    .row:last-child {
      border-bottom: 0;
    }

    .checkCell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1.5px solid #000;
      cursor: pointer;
      min-height: 40px;
      padding: 4px;
    }

    .itemName {
      display: flex;
      align-items: center;
      padding: 4px 14px;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
      cursor: pointer;
      word-break: break-word;
    }

    .colorCell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1.5px solid #000;
      min-height: 40px;
      padding: 4px;
    }

    .colorSelect {
      width: 96px;
      height: 32px;
      border: 1.5px solid #000;
      background: #fff;
      color: #000;
      padding: 1px 2px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .deleteBtn {
      width: 96px;
      height: 32px;
      border: 1.5px solid #000;
      background: #ff0000;
      color: #fff;
      padding: 1px 2px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .customCheck {
      width: 28px;
      height: 28px;
      border: 2px solid #000;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      color: transparent;
      user-select: none;
    }

    .customCheck.checked {
      color: #ff0000;
    }

    .row.row-red {
      background: rgba(255, 0, 0, .15);
    }

    .row.row-green {
      background: rgba(0, 180, 0, .14);
    }

    .row.row-yellow {
      background: rgba(255, 210, 0, .24);
    }

    .row.row-blue {
      background: rgba(0, 145, 255, .14);
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 22px;
      font-weight: 900;
    }

    @media (max-width: 780px) {
      body {
        padding: 8px;
      }

      .title {
        font-size: 44px;
        letter-spacing: 7px;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .rightCol {
        gap: 16px;
      }

      .boxTitle {
        font-size: 30px;
      }

      .itemName {
        font-size: 19px;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .status {
        grid-column: 1 / -1;
      }

      .addPanel {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 58px 1fr 104px;
        min-height: 40px;
      }

      .checkCell {
        min-height: 40px;
      }

      .colorCell {
        min-height: 40px;
      }

      .colorSelect,
      .deleteBtn {
        width: 96px;
        height: 32px;
        font-size: 12px;
      }
    }

    @media print {
      body {
        padding: 0;
      }

      .controls,
      .addPanel {
        display: none !important;
      }

      .page {
        max-width: none;
        width: 100%;
      }

      .title {
        font-size: 58px;
        margin-top: 0;
      }

      .layout {
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .box {
        break-inside: avoid;
      }

      .customCheck.checked {
        color: #ff0000 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .row.row-red,
      .row.row-green,
      .row.row-yellow,
      .row.row-blue {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .colorCell {
        display: none;
      }

      .row {
        grid-template-columns: 46px 1fr;
        min-height: 31px;
      }

      .checkCell {
        min-height: 31px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="title">PREP LIST</div>

    <div class="controls">
      <div id="status" class="status">Loading...</div>
      <button id="updateBtn">AUTO SAVE</button>
      <button onclick="refreshNow()">REFRESH</button>
      <button onclick="toggleAddPanel()">ADD</button>
      <button id="deleteModeBtn" onclick="toggleDeleteMode()">DELETE MODE</button>
    </div>

    <div id="addPanel" class="addPanel">
      <select id="newSection">
        <option value="Prep">Prep</option>
        <option value="Sauce">Sauce</option>
        <option value="Bakery">Bakery</option>
        <option value="Cookie">Cookie</option>
      </select>

      <input id="newItem" placeholder="New item name">

      <button onclick="addNewItem()">ADD ITEM</button>
    </div>

    <div id="content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      addDoc,
      updateDoc,
      deleteDoc,
      onSnapshot,
      getDocs,
      serverTimestamp,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDzdxT4kocIK04UJhhbMQjpVw4Wtim5yVg",
      authDomain: "prep-5ada7.firebaseapp.com",
      projectId: "prep-5ada7",
      storageBucket: "prep-5ada7.firebasestorage.app",
      messagingSenderId: "678949496330",
      appId: "1:678949496330:web:037d9332743ec51638e1f3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const prepRef = collection(db, "prepItems");

    let items = [];
    let isSaving = false;
    let isRefreshing = false;
    let deleteMode = false;
    let firstLoadDone = false;

    const SECTION_ORDER = ["Prep", "Sauce", "Bakery", "Cookie"];

    const defaultItems = [
      { section: "Prep", item: "Cook Rice", checked: false, color: "none", sort: 1 },
      { section: "Prep", item: "Grill Chicken", checked: false, color: "none", sort: 2 },
      { section: "Prep", item: "Gnocchi", checked: false, color: "none", sort: 3 },
      { section: "Prep", item: "Basil Pick", checked: false, color: "none", sort: 4 },

      { section: "Sauce", item: "Aioli", checked: false, color: "none", sort: 1 },
      { section: "Sauce", item: "Dressing", checked: false, color: "none", sort: 2 },

      { section: "Bakery", item: "Cookies", checked: false, color: "none", sort: 1 },

      { section: "Cookie", item: "Cookie Dough", checked: false, color: "none", sort: 1 }
    ];

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function setSavingState(saving) {
      isSaving = saving;
      const btn = document.getElementById("updateBtn");

      if (saving) {
        btn.classList.add("saving");
        btn.textContent = "SAVING";
      } else {
        btn.classList.remove("saving");
        btn.textContent = "AUTO SAVE";
      }
    }

    function updateDeleteModeButton() {
      const btn = document.getElementById("deleteModeBtn");

      if (deleteMode) {
        btn.classList.add("deleteOn");
        btn.textContent = "DELETE ON";
      } else {
        btn.classList.remove("deleteOn");
        btn.textContent = "DELETE MODE";
      }
    }

    function sortItemsLocal() {
      const order = {
        Prep: 1,
        Sauce: 2,
        Bakery: 3,
        Cookie: 4
      };

      items.sort((a, b) => {
        const sa = order[a.section] || 99;
        const sb = order[b.section] || 99;

        if (sa !== sb) return sa - sb;

        const sortA = Number(a.sort || 9999);
        const sortB = Number(b.sort || 9999);

        if (sortA !== sortB) return sortA - sortB;

        return String(a.item || "").localeCompare(String(b.item || ""));
      });
    }

    async function seedDefaultItemsIfEmpty() {
      const snap = await getDocs(prepRef);
      if (!snap.empty) return;

      const batch = writeBatch(db);

      defaultItems.forEach(data => {
        const id = makeId(data.section, data.item);
        const ref = doc(db, "prepItems", id);

        batch.set(ref, {
          ...data,
          id,
          updatedAt: serverTimestamp()
        });
      });

      await batch.commit();
    }

    function loadRealtime() {
      setStatus("Connecting real-time...");

      onSnapshot(
        prepRef,
        async snapshot => {
          items = snapshot.docs.map(docSnap => ({
            id: docSnap.id,
            ...docSnap.data()
          }));

          if (items.length === 0 && !firstLoadDone) {
            firstLoadDone = true;
            setStatus("Creating default prep list...");
            await seedDefaultItemsIfEmpty();
            return;
          }

          firstLoadDone = true;
          sortItemsLocal();
          render();
          updateDeleteModeButton();

          const t = new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          });

          setStatus("Live sync ✅ " + t);
        },
        error => {
          console.error(error);
          setStatus("Firestore error ❌ Check Rules");
          document.getElementById("content").innerHTML =
            `<div class="loading">Cannot connect to Firebase</div>`;
        }
      );
    }

    function render() {
      const content = document.getElementById("content");

      if (!items.length) {
        content.innerHTML = `<div class="loading">No items</div>`;
        return;
      }

      const groups = {};
      SECTION_ORDER.forEach(section => groups[section] = []);

      items.forEach(item => {
        if (!groups[item.section]) groups[item.section] = [];
        groups[item.section].push(item);
      });

      const leftHtml = renderBox("Prep", groups["Prep"] || []);

      const rightHtml =
        renderBox("Sauce", groups["Sauce"] || []) +
        renderBox("Bakery", groups["Bakery"] || []) +
        renderBox("Cookie", groups["Cookie"] || []);

      content.innerHTML = `
        <div class="layout">
          <div class="leftCol">${leftHtml}</div>
          <div class="rightCol">${rightHtml}</div>
        </div>
      `;
    }

    function renderBox(title, list) {
      if (!list.length) return "";

      let html = `
        <div class="box">
          <div class="boxTitle">${escapeHtml(title)}</div>
      `;

      list.forEach(item => {
        const checkedClass = item.checked ? "checked" : "";
        const rowColor = item.color && item.color !== "none" ? `row-${item.color}` : "";
        const safeId = escapeAttr(item.id);
        const safeName = escapeAttr(item.item);

        let rightControl = "";

        if (deleteMode) {
          rightControl = `
            <button class="deleteBtn" onclick="confirmDelete('${safeId}', '${safeName}'); event.stopPropagation();">
              DELETE
            </button>
          `;
        } else {
          rightControl = `
            <select class="colorSelect" onchange="changeColor('${safeId}', this.value)" onclick="event.stopPropagation()">
              <option value="none" ${item.color === "none" ? "selected" : ""}>None</option>
              <option value="red" ${item.color === "red" ? "selected" : ""}>Red</option>
              <option value="green" ${item.color === "green" ? "selected" : ""}>Green</option>
              <option value="yellow" ${item.color === "yellow" ? "selected" : ""}>Yellow</option>
              <option value="blue" ${item.color === "blue" ? "selected" : ""}>Blue</option>
            </select>
          `;
        }

        html += `
          <div class="row ${rowColor}">
            <div class="checkCell" onclick="toggleCheck('${safeId}')">
              <div class="customCheck ${checkedClass}">✓</div>
            </div>

            <div class="itemName" onclick="toggleCheck('${safeId}')">
              ${escapeHtml(item.item)}
            </div>

            <div class="colorCell">
              ${rightControl}
            </div>
          </div>
        `;
      });

      html += `</div>`;
      return html;
    }

    window.toggleCheck = async function(id) {
      if (deleteMode || isSaving) return;

      const item = items.find(x => x.id === id);
      if (!item) return;

      item.checked = !item.checked;
      render();

      await saveItemChange(item, "Saved ✅");
    };

    window.changeColor = async function(id, color) {
      if (isSaving) return;

      const item = items.find(x => x.id === id);
      if (!item) return;

      item.color = color || "none";
      render();

      await saveItemChange(item, "Color saved ✅");
    };

    async function saveItemChange(item, successText) {
      setSavingState(true);
      setStatus("Saving...");

      try {
        await updateDoc(doc(db, "prepItems", item.id), {
          checked: !!item.checked,
          color: item.color || "none",
          updatedAt: serverTimestamp()
        });

        const t = new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });

        setStatus(successText + " " + t);
      } catch (error) {
        console.error(error);
        setStatus("Save failed ❌");
      } finally {
        setSavingState(false);
      }
    }

    window.refreshNow = function() {
      if (isSaving || isRefreshing) return;

      isRefreshing = true;

      const t = new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      setStatus("Already live ✅ " + t);

      setTimeout(() => {
        isRefreshing = false;
      }, 500);
    };

    window.toggleDeleteMode = function() {
      deleteMode = !deleteMode;
      updateDeleteModeButton();
      render();

      if (deleteMode) {
        setStatus("Delete mode ON — กด DELETE เพื่อลบ item");
      } else {
        setStatus("Delete mode OFF");
      }
    };

    window.confirmDelete = async function(id, itemName) {
      if (!deleteMode || isSaving) return;

      const ok = confirm("Delete this item?\n\n" + itemName);
      if (!ok) return;

      setSavingState(true);
      setStatus("Deleting " + itemName + "...");

      try {
        await deleteDoc(doc(db, "prepItems", id));
        setStatus("Deleted ✅");
      } catch (error) {
        console.error(error);
        setStatus("Delete failed ❌");
      } finally {
        setSavingState(false);
      }
    };

    window.toggleAddPanel = function() {
      const panel = document.getElementById("addPanel");
      panel.style.display = panel.style.display === "grid" ? "none" : "grid";
    };

    window.addNewItem = async function() {
      const section = document.getElementById("newSection").value;
      const itemName = document.getElementById("newItem").value.trim();

      if (!itemName) {
        setStatus("ใส่ชื่อ item ก่อน");
        return;
      }

      setSavingState(true);
      setStatus("Adding item...");

      try {
        const id = makeId(section, itemName);

        const exists = items.some(x => x.id === id);
        if (exists) {
          setStatus("Item already exists ❌");
          setSavingState(false);
          return;
        }

        const sectionItems = items.filter(x => x.section === section);
        const maxSort = sectionItems.reduce((max, x) => {
          return Math.max(max, Number(x.sort || 0));
        }, 0);

        await setDoc(doc(db, "prepItems", id), {
          id,
          section,
          item: itemName,
          checked: false,
          color: "none",
          sort: maxSort + 1,
          updatedAt: serverTimestamp()
        });

        document.getElementById("newItem").value = "";
        setStatus("Added ✅");
      } catch (error) {
        console.error(error);
        setStatus("Add failed ❌");
      } finally {
        setSavingState(false);
      }
    };

    function makeId(section, itemName) {
      const slug = String(itemName || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      const sec = String(section || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      return sec + "-" + slug;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(str) {
      return String(str || "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
    }

    loadRealtime();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Prep List</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/svg+xml" href="app-icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-title" content="Prep List">
  <meta name="application-name" content="Prep List">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f7f7f8">
  <meta name="app-build" content="FIRESTORE_ONLY_CLEAN_V18_30_MOVE_SECTION_EDIT_TOOLS_ROW">

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; min-width: 0; margin: 0; padding: 0;
      background: #ffffff; font-family: Arial, Helvetica, sans-serif;
      color: #000; overflow-x: hidden;
    }
    body { padding: 4px; }
    .page { width: 100%; min-width: 0; max-width: none; margin: 0 auto; background: #fff; }
    .title {
      text-align: center; font-size: 30px; font-weight: 900;
      letter-spacing: 7px; line-height: 1; margin: 2px 0 8px;
    }
    .controls {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.96); border: 2px solid #000;
      padding: 6px; margin-bottom: 8px; display: grid;
      grid-template-columns: 1fr 1fr; gap: 6px; align-items: stretch;
    }
    .status {
      grid-column: 1 / -1; font-size: 11px; font-weight: 900;
      color: #111; white-space: normal; line-height: 1.2;
      border-bottom: 1.5px solid #000; padding-bottom: 5px; margin-bottom: 1px;
    }
    button {
      border: 2px solid #000; background: #fff; color: #000;
      font-weight: 900; padding: 8px 4px; font-size: 11px; cursor: pointer;
      min-height: 34px; width: 100%;
      border-radius: 999px;
    }
    button:active { transform: scale(.98); }
    #editModeBtn {
      background: #000; color: #fff; border-color: #000;
    }
    #editModeBtn.editOn {
      background: #16a34a; color: #fff; border-color: #16a34a;
    }
    #deleteModeBtn {
      background: #000; color: #fff; border-color: #000;
    }
    #deleteModeBtn.deleteOn {
      background: #ff0000; color: #fff; border-color: #ff0000;
    }
    .addPanel {
      display: grid; grid-template-columns: 72px 1fr 82px;
      gap: 5px; margin-bottom: 8px; border: 2px solid #000; padding: 5px;
    }
    select, input, textarea {
      border: 2px solid #000; padding: 6px 4px; font-size: 11px;
      font-weight: 700; background: #fff; color: #000; min-width: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    #newSection { border-radius: 18px; padding-left: 7px; padding-right: 7px; }
    .layout {
      display: grid !important; grid-template-columns: 1fr 1fr !important;
      gap: 6px; align-items: start; width: 100%;
    }
    .leftCol, .rightCol { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .box { border: 2px solid #000; background: #fff; width: 100%; min-width: 0; }
    .boxTitle {
      text-align: center; font-size: 21px; font-weight: 900;
      padding: 3px 4px; border-bottom: 2px solid #000; line-height: 1.1;
    }
    .row {
      display: grid; grid-template-columns: 28px 1fr 55px;
      min-height: 31px; border-bottom: 1.5px solid #000; background: #fff;
    }
    .row:last-child { border-bottom: 0; }
    .checkCell {
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; min-height: 31px; padding: 2px;
    }
    .itemName {
      display: flex; align-items: center; padding: 3px 5px;
      font-size: 12px; font-weight: 900; line-height: 1.05;
      cursor: pointer; word-break: break-word; min-width: 0;
    }

    .colorCell {
      display: flex; align-items: center; justify-content: flex-end;
      min-height: 31px; padding: 2px 5px 2px 2px;
    }
    .colorWheelSelect {
      width: 22px;
      height: 22px;
      min-width: 22px;
      min-height: 22px;
      padding: 0;
      border: 0;
      outline: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fff 0 47%, transparent 49%),
        conic-gradient(red, orange, yellow, lime, cyan, blue, purple, magenta, red);
      cursor: pointer;
      color: transparent;
      font-size: 0;
      line-height: 0;
      appearance: none;
      -webkit-appearance: none;
      box-shadow: none;
    }
    .colorWheelSelect:focus {
      outline: 0;
      box-shadow: none;
    }
    .colorWheelSelect option {
      color: #000;
      font-size: 14px;
      font-weight: 900;
    }
    .deleteBtn {
      width: 50px; height: 24px; border: 1.5px solid #000;
      background: #ff0000; color: #fff; padding: 0 1px;
      font-size: 9px; font-weight: 900; cursor: pointer; border-radius: 14px;
    }
    .customCheck {
      width: 20px; height: 20px; border: 2px solid #000; background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; line-height: 1; font-weight: 900;
      color: transparent; user-select: none;
    }
    .customCheck.checked { color: #ff0000; }
    .row.row-red { background: rgba(255, 0, 0, .15); }
    .row.row-green { background: rgba(0, 180, 0, .14); }
    .row.row-yellow { background: rgba(255, 210, 0, .24); }
    .row.row-blue { background: rgba(0, 145, 255, .14); }
    .loading { text-align: center; padding: 40px; font-size: 18px; font-weight: 900; }
    .modalOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.55); display: none;
      align-items: center; justify-content: center; padding: 12px;
    }
    .modalOverlay.show { display: flex; }
    .modalBox {
      width: min(720px, 100%); max-height: 88vh; overflow: auto;
      background: #fff; border: 3px solid #000; padding: 10px;
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }
    .modalHeader {
      display: grid; grid-template-columns: 1fr auto; gap: 8px;
      align-items: center; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 8px;
    }
    .modalTitle { font-size: 18px; font-weight: 900; line-height: 1.1; }
    .modalTitleRow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .recipeMultiplierTools {
      display: none;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .recipeMultiplierTools.show {
      display: flex;
    }
    .recipeMultiplierTools button {
      width: auto;
      min-height: 28px;
      padding: 4px 9px;
      font-size: 11px;
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
      line-height: 1;
      border-radius: 999px;
    }
    .modalActionBtn {
      display: none;
      width: auto;
      min-height: 28px;
      padding: 4px 10px;
      font-size: 11px;
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
      line-height: 1;
      border-radius: 999px;
    }
    .modalActionBtn.show {
      display: inline-block;
    }
    .modalActionSelect {
      display: none;
      width: auto;
      min-height: 28px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 900;
      background: #d1d5db;
      color: #000;
      border: 2px solid #9ca3af;
      border-radius: 999px;
      line-height: 1;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
    }
    .modalActionSelect.show {
      display: inline-block;
    }
    .moveSectionBtn {
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
    }
    .photoBtn,
    .photoDangerBtn {
      background: #d1d5db;
      color: #000;
      border-color: #9ca3af;
    }
    .photoModalOverlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .photoModalOverlay.show {
      display: flex;
    }
    .photoModalBox {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 3px solid #000;
      padding: 10px;
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
    }
    .photoModalHeader {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
      margin-bottom: 8px;
    }
    .photoModalTitle {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
    }
    .photoImage {
      display: block;
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border: 2px solid #000;
      background: #fff;
    }
    .photoEmpty {
      border: 2px solid #000;
      padding: 18px;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      color: #555;
    }
    .modalSub { font-size: 11px; font-weight: 800; margin-top: 4px; color: #333; }
    .closeBtn {
      width: 42px;
      min-width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      background: transparent;
      color: #dc2626;
      border: 0;
      border-radius: 50%;
      font-size: 34px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
    }
    .recipeTextarea {
      width: 100%; min-height: 260px; resize: vertical;
      font-size: 16px; line-height: 1.35; font-weight: 700; padding: 10px;
    }
    .recipeTextView {
      width: 100%; min-height: 160px; white-space: pre-wrap;
      border: 2px solid #000; padding: 10px; font-size: 16px;
      line-height: 1.35; font-weight: 700; background: #fff;
    }
    .recipeCheckList {
      width: 100%;
      min-height: 160px;
      border: 2px solid #000;
      background: #fff;
      padding: 0;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
    }
    .recipeCheckLine {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 7px;
      align-items: start;
      padding: 7px 10px;
      border-bottom: 1.5px solid #000;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .recipeCheckLine:last-child {
      border-bottom: 0;
    }
    .recipeCheckLine input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin: 0;
      accent-color: #16a34a;
    }
    .recipeCheckSpacer {
      width: 22px;
      height: 22px;
      display: block;
    }
    .recipeCheckLine.noCheck .recipeCheckText {
      opacity: .95;
    }
    .recipeCheckLine.done .recipeCheckText {
      text-decoration: line-through;
      opacity: .55;
    }
    .recipeEmpty { color: #777; font-style: italic; }
    .modalFoot { margin-top: 8px; font-size: 11px; font-weight: 900; color: #111; }
    @media (min-width: 780px) {
      body { padding: 12px; }
      .page { max-width: 1080px; }
      .title { font-size: 58px; letter-spacing: 12px; margin: 4px 0 14px; }
      .controls {
        padding: 8px; margin-bottom: 12px;
        grid-template-columns: 1fr 140px 140px;
        grid-template-rows: auto auto;
        gap: 8px;
        align-items: stretch;
      }
      .status {
        grid-column: 1;
        grid-row: 1 / 3;
        align-self: stretch;
        display: flex;
        align-items: center;
        font-size: 14px;
        white-space: nowrap;
        border-bottom: 0;
        padding-bottom: 0;
        margin-bottom: 0;
      }
      button { padding: 9px 12px; font-size: 14px; min-height: 40px; }
      .controls button:nth-of-type(1) { grid-column: 2; grid-row: 1; }
      .controls button:nth-of-type(2) { grid-column: 3; grid-row: 1; }
      #editModeBtn { grid-column: 2; grid-row: 2; }
      #deleteModeBtn { grid-column: 3; grid-row: 2; }
      .addPanel {
        grid-template-columns: 130px 1fr auto; gap: 8px;
        margin-bottom: 12px; padding: 8px;
      }
      select, input { padding: 9px; font-size: 15px; }
      .layout { gap: 20px; }
      .leftCol, .rightCol { gap: 22px; }
      .boxTitle { font-size: 32px; padding: 4px 8px; }
      .row { grid-template-columns: 58px 1fr 106px; min-height: 40px; }
      .checkCell, .colorCell { min-height: 40px; padding: 4px; }
      .itemName { font-size: 20px; padding: 4px 14px; line-height: 1.1; }

      .photoModalTitle { font-size: 26px; }
      .colorWheelSelect { width: 24px; height: 24px; min-width: 24px; min-height: 24px; }
      .colorCell { justify-content: flex-end; padding-right: 12px; }
      .deleteBtn { width: 96px; height: 32px; font-size: 13px; padding: 1px 2px; }
      .customCheck { width: 28px; height: 28px; font-size: 28px; }
      .modalTitle { font-size: 26px; }
      .recipeMultiplierTools button { min-height: 30px; padding: 5px 9px; font-size: 12px; }
      .modalActionBtn { min-height: 30px; padding: 5px 10px; font-size: 12px; }
      .modalActionSelect { min-height: 30px; padding: 5px 10px; font-size: 12px; }
      .recipeCheckLine { grid-template-columns: 30px 1fr; padding: 8px 10px; }
      .modalSub, .modalFoot { font-size: 13px; }
    }
    :root {
      --ink: #1f2937;
      --muted-ink: #6b7280;
      --line-soft: #d1d5db;
      --cream: #f7f7f8;
      --paper: #ffffff;
      --sage: #eeeeef;
      --olive: #4b5563;
      --olive-dark: #111827;
      --warm-grey: #e5e7eb;
      --danger: #dc2626;
      --recipe-dot: #16a34a;
      --photo-dot: #dc2626;
      --blue-soft: #e5e7eb;
      --yellow-soft: #f3f4f6;
      --red-soft: #f4eeee;
      --green-soft: #edf4ef;
      --shadow-soft: 0 8px 22px rgba(17, 24, 39, .08);
    }
    html, body {

    }

    .photoModalHeader {

  display: grid !important;
  grid-template-columns: 1fr !important;
  grid-template-rows: auto auto !important;
  align-items: center !important;
  justify-content: stretch !important;
  gap: 5px !important;
  min-height: 54px !important;
  padding: 6px 8px !important;
  overflow: visible !important;
}

body.edit-mode-active .box .boxTitleText,
body.edit-mode-active .box.boxFull .boxTitleText {
  grid-column: 1 !important;
  grid-row: 1 !important;
  width: 100% !important;
  max-width: 100% !important;
  justify-self: center !important;
  text-align: center !important;
  white-space: nowrap !important;
  overflow: hidden !important;
  text-overflow: ellipsis !important;
}

body.edit-mode-active .box .sectionTools,
body.edit-mode-active .box.boxFull .sectionTools {
  grid-column: 1 !important;
  grid-row: 2 !important;
  width: 100% !important;
  max-width: 100% !important;
  min-width: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  flex-wrap: nowrap !important;
  gap: 4px !important;
  overflow: visible !important;
  white-space: nowrap !important;
}

body.edit-mode-active .box .sectionEyeBtn,
body.edit-mode-active .box.boxFull .sectionEyeBtn {
  grid-column: auto !important;
  grid-row: auto !important;
  position: static !important;
  transform: none !important;
  margin: 0 !important;
  justify-self: auto !important;
  align-self: center !important;
}

.sectionMoveSideBtn {
  width: 24px !important;
  min-width: 24px !important;
  max-width: 24px !important;
  height: 22px !important;
  min-height: 22px !important;
  max-height: 22px !important;
  padding: 0 !important;
  border-radius: 999px !important;
  border: 1.5px solid #c7cbd1 !important;
  background: #ffffff !important;
  color: #111827 !important;
  font-size: 13px !important;
  line-height: 1 !important;
  display: none !important;
  align-items: center !important;
  justify-content: center !important;
  box-shadow: 0 2px 6px rgba(17,24,39,.05) !important;
  flex: 0 0 24px !important;
}

body.edit-mode-active .sectionMoveSideBtn {
  display: inline-flex !important;
}

body.edit-mode-active .sectionOrderToggleBtn,
body.edit-mode-active .pickupSectionBtn,
body.edit-mode-active .resetQtySectionBtn,
body.edit-mode-active .sectionDeleteEmptyBtn,
body.edit-mode-active .sectionEyeBtn,
body.edit-mode-active .sectionMoveSideBtn {
  margin: 0 !important;
  flex-shrink: 0 !important;
}

@media (max-width: 520px) {
  body.edit-mode-active .box .boxTitle,
  body.edit-mode-active .box.boxFull .boxTitle {
    min-height: 52px !important;
    gap: 4px !important;
    padding: 5px 6px !important;
  }

  body.edit-mode-active .box .sectionTools,
  body.edit-mode-active .box.boxFull .sectionTools {
    gap: 3px !important;
    transform: scale(.96) !important;
    transform-origin: center center !important;
  }

  .sectionMoveSideBtn {
    width: 22px !important;
    min-width: 22px !important;
    max-width: 22px !important;
    height: 20px !important;
    min-height: 20px !important;
    max-height: 20px !important;
    font-size: 12px !important;
    flex-basis: 22px !important;
  }
}

  </style>

    (function () {
      var done = false;

      function finishSplashHard() {
        if (done) return;
        done = true;

        var splash = document.getElementById("appSplash");
        document.body.classList.add("appReady");

        if (!splash) return;

        try {
          splash.classList.add("fadeOut");
          setTimeout(function () {
            try {
              splash.classList.add("hide");
              if (splash.parentNode) splash.parentNode.removeChild(splash);
            } catch (error) {}
          }, 760);
        } catch (error) {
          try {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          } catch (innerError) {}
        }
      }

      window.__finishPrepSplashHard = finishSplashHard;

      if (document.readyState === "complete" || document.readyState === "interactive") {
        setTimeout(finishSplashHard, 3600);
      } else {
        document.addEventListener("DOMContentLoaded", function () {
          setTimeout(finishSplashHard, 3600);
        }, { once: true });
      }

      // Absolute fallback. Even if DOM events behave oddly in iOS PWA, remove splash.
      setTimeout(finishSplashHard, 5200);
    })();
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

      const target = document.getElementById("homeCategoryList");
      if (target && !target.children.length) {
        target.innerHTML = `<div class="homeCategoryCard"><div class="loading" style="padding:18px;font-size:13px;">Startup error: ${String(event.message || "unknown").slice(0, 120)}</div></div>`;

      }
      if (window.__finishPrepSplashHard) window.__finishPrepSplashHard();
    });

    const firebaseConfig = {
      apiKey: "AIzaSyDzdxT4kocIK04UJhhbMQjpVw4Wtim5yVg",
      authDomain: "prep-5ada7.firebaseapp.com",
      projectId: "prep-5ada7",
      storageBucket: "prep-5ada7.firebasestorage.app",
      messagingSenderId: "678949496330",
      appId: "1:678949496330:web:037d9332743ec51638e1f3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const prepRef = collection(db, "prepItems");
    // Home/category/subpage data is stored here: prepItems / __homeConfig
    // V18 source of truth for category/subpage sync: prepItems / __homeConfig
    const HOME_CONFIG_DOC_ID = "__homeConfig";
    const homeConfigRef = doc(db, "prepItems", HOME_CONFIG_DOC_ID);
    let homeConfigCache = null;
    let isApplyingRemoteHomeConfig = false;
    let homeConfigSaveTimer = null;
    let items = [];
    let deleteMode = false;
    let editMode = false;
    let isSaving = false;
    let activeRecipeItemId = null;
    let recipeSaveTimer = null;
    let recipeCheckSaveTimer = null;
    let originalRecipePreview = "";
    let currentRecipePreview = "";
    let activeMultiplierValue = 1;
    let activePhotoItemId = null;
    let currentPageId = "prep-list";


    const APP_BUILD_VERSION = "FIRESTORE_ONLY_CLEAN_V18_30_MOVE_SECTION_EDIT_TOOLS_ROW";
    const APP_BUILD_KEY = "prep_app_build_version_v1";

    async function clearOldPWACaches() {
      // V18.1: no service-worker/offline cache system. Keep this as a safe no-op.
    }

    function clearHomeLocalStateForNewBuild() {
      try {
        const lastBuild = localStorage.getItem(APP_BUILD_KEY);
        if (lastBuild === APP_BUILD_VERSION) return;

        // Clear only Home/UI local caches that cause Safari/PWA disagreement.
        // Do NOT clear prepItems data in Firestore.
        [
          "prep_home_config_v1",
          "prep_home_unsynced_v1",
          "prep_home_open_v1",
          "prep_section_layout_v1",
          "prep_section_collapsed_v1",
          
        ].forEach(key => localStorage.removeItem(key));

        Object.keys(localStorage).forEach(key => {
          if (
            key.startsWith("prep_custom_sections_v1_") ||
            key.startsWith("prep_section_layout_v1_") ||
            key.startsWith("prep_section_collapsed_v1_")
          ) {
            localStorage.removeItem(key);
          }
        });

        localStorage.setItem(APP_BUILD_KEY, APP_BUILD_VERSION);
      } catch (error) {
        console.warn("Build cache reset skipped", error);
      }
    }

    const HOME_CONFIG_KEY = "prep_home_config_v1";
    const HOME_UNSYNCED_KEY = "prep_home_unsynced_v1";
    const HOME_DEVICE_ID_KEY = "prep_home_device_id_v1";

    function getHomeDeviceId() {
      let id = localStorage.getItem(HOME_DEVICE_ID_KEY);
      if (!id) {
        id = `device-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 9)}`;
        localStorage.setItem(HOME_DEVICE_ID_KEY, id);
      }
      return id;
    }

    function markHomeConfigUnsynced(config) {
      console.warn("Offline Home save disabled. Change was not synced.", config);
    }

    function getUnsyncedHomeConfig() {
      return null;
    }

    function clearUnsyncedHomeConfig() {
      localStorage.removeItem(HOME_UNSYNCED_KEY);
    }

    function homeConfigSignature(config) {
      const fixed = repairHomeConfig(config);
      return JSON.stringify((fixed.categories || []).map(category => ({
        id: category.id,
        name: category.name,
        pinned: !!category.pinned,
        subpages: (category.subpages || []).map(page => ({
          id: page.id,
          name: page.name,
          pinned: !!page.pinned
        }))
      })));
    }

    function autoOpenNewRemoteHomeCategories(previousConfig, nextConfig) {
      try {
        const previous = repairHomeConfig(previousConfig || createDefaultHomeConfig());
        const next = repairHomeConfig(nextConfig || createDefaultHomeConfig());
        const previousMap = new Map();
        (previous.categories || []).forEach(category => {
          previousMap.set(category.id, new Set((category.subpages || []).map(page => page.id)));
        });

        const openConfig = getHomeOpenConfig();
        let changed = false;

        (next.categories || []).forEach(category => {
          const oldPages = previousMap.get(category.id);
          const newPages = new Set((category.subpages || []).map(page => page.id));
          let hasNewSubpage = !oldPages;

          if (oldPages) {
            for (const pageId of newPages) {
              if (!oldPages.has(pageId)) {
                hasNewSubpage = true;
                break;
              }
            }
          }

          if (hasNewSubpage && newPages.size) {
            openConfig[category.id] = true;
            changed = true;
          }
        });

        if (changed) saveHomeOpenConfig(openConfig);
      } catch (error) {
        console.warn("Auto-open remote Home category failed", error);
      }
    }

    function cleanHomeConfigForFirestore(config) {
      const fixed = repairHomeConfig(config || createDefaultHomeConfig());
      return {
        categories: (fixed.categories || []).map(category => ({
          id: String(category.id || makeLocalId("cat")),
          name: normalizeSectionName(category.name || "Category"),
          pinned: !!category.pinned,
          subpages: (category.subpages || []).map(page => ({
            id: String(page.id || makeLocalId("page")),
            name: normalizeSectionName(page.name || "Subpage"),
            pinned: !!page.pinned
          }))
        }))
      };
    }

    async function pushHomeConfigToCloud(config, reason = "home-edit") {
      if (!navigator.onLine) {
        setStatus("Offline - Home change not saved");
        throw new Error("Offline: Home config save blocked");
      }

      const fixed = cleanHomeConfigForFirestore(config);
      await setDoc(homeConfigRef, {
        id: HOME_CONFIG_DOC_ID,
        type: "homeConfig",
        item: "__HOME_CONFIG_DO_NOT_DELETE",
        section: "__meta",
        pageId: "__meta",
        categories: fixed.categories,
        syncVersion: Date.now(),
        updatedBy: getHomeDeviceId(),
        updatedReason: reason,
        updatedAt: serverTimestamp()
      }, { merge: false });

      homeConfigCache = fixed;
      renderHome();
      return fixed;
    }

    async function getCloudHomeConfig() {
      const snap = await getDoc(homeConfigRef);
      if (snap.exists()) return cleanHomeConfigForFirestore(snap.data());

      const fallback = cleanHomeConfigForFirestore(createDefaultHomeConfig());
      await pushHomeConfigToCloud(fallback, "initial-seed");
      return fallback;
    }

    async function mutateHomeConfigCloud(mutator, reason = "home-edit") {
      if (!navigator.onLine) {
        alert("Offline - this change was not saved. Connect internet and try again.");
        setStatus("Offline - Home change not saved");
        return { config: getHomeConfig(), result: null };
      }

      try {
        const latest = await getCloudHomeConfig();
        const draft = JSON.parse(JSON.stringify(latest));
        const result = mutator(draft) || null;
        const fixed = await pushHomeConfigToCloud(draft, reason);
        setStatus("Home synced OK");
        return { config: fixed, result };
      } catch (error) {
        console.error(error);
        alert("Home sync failed. Check Firestore / internet.");
        setStatus("Home sync failed - check Firestore");
        throw error;
      }
    }

    function repairHomeConfig(config) {
      const fallback = createDefaultHomeConfig();

      if (!config || !Array.isArray(config.categories)) return fallback;

      config.categories = config.categories.filter(category => category && category.id && category.name);

      // Prevent blank Home screen if localStorage saved an empty category list.
      if (!config.categories.length) {
        config.categories = fallback.categories;
        return config;
      }

      config.categories.forEach(category => {
        if (!Array.isArray(category.subpages)) category.subpages = [];
        category.subpages = category.subpages.filter(page => page && page.id && page.name);
      });

      // Make sure the original Prep List page can always be reached.
      const hasDefaultPage = config.categories.some(category =>
        (category.subpages || []).some(page => page.id === DEFAULT_PAGE_ID)
      );

      if (!hasDefaultPage) {
        config.categories[0].subpages = config.categories[0].subpages || [];
        config.categories[0].subpages.unshift({ id: DEFAULT_PAGE_ID, name: "Prep List", pinned: true });
      }

      return config;
    }

      const categories = [...(fixed.categories || [])]

    }

    function mergeHomeConfigs(localConfig, remoteConfig) {
      const local = repairHomeConfig(localConfig);
      const remote = repairHomeConfig(remoteConfig);
      const categoryMap = new Map();

      function absorb(source, preferNames = false) {
        (source.categories || []).forEach(category => {
          if (!category || !category.id) return;

          const existing = categoryMap.get(category.id) || {
            id: category.id,
            name: category.name || "Category",
            pinned: !!category.pinned,
            subpages: []
          };

          if (preferNames || !existing.name) existing.name = category.name || existing.name;
          existing.pinned = !!existing.pinned || !!category.pinned;

          const pageMap = new Map((existing.subpages || []).map(page => [page.id, page]));

          (category.subpages || []).forEach(page => {
            if (!page || !page.id) return;

            const existingPage = pageMap.get(page.id) || {
              id: page.id,
              name: page.name || "Subpage",
              pinned: !!page.pinned
            };

            if (preferNames || !existingPage.name) existingPage.name = page.name || existingPage.name;
            existingPage.pinned = !!existingPage.pinned || !!page.pinned;

            pageMap.set(page.id, existingPage);
          });

          existing.subpages = Array.from(pageMap.values());
          categoryMap.set(category.id, existing);
        });
      }

      // Local first preserves categories made on this device.
      // Remote second preserves latest shared names when ids match.
      absorb(local, false);
      absorb(remote, true);

      return repairHomeConfig({ categories: Array.from(categoryMap.values()) });
    }

    function playStartupSoundOnce() {
      if (startupSoundPlayed) return;
      startupSoundPlayed = true;

      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        const audioCtx = new AudioContextClass();
        const now = audioCtx.currentTime;

        function tone(freq, start, duration, gainValue) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, now + start);
          gain.gain.setValueAtTime(0.0001, now + start);
          gain.gain.exponentialRampToValueAtTime(gainValue, now + start + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + start + duration);

          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + start);
          osc.stop(now + start + duration + 0.02);
        }

        tone(98, 0.00, 0.22, 0.10);
        tone(147, 0.20, 0.30, 0.12);
        tone(196, 0.42, 0.22, 0.08);
      } catch (error) {
        console.warn("Startup sound blocked", error);

    // ===== V18.28 RECOVER HIDDEN SUBPAGES FROM EXISTING ITEMS =====
    function getKnownHomePageIds(config) {
      const ids = new Set();
      (config.categories || []).forEach(category => {
        (category.subpages || []).forEach(page => {
          if (page && page.id) ids.add(String(page.id));
        });
      });
      return ids;
    }

    function inferPageNameFromPageId(pageId) {
      const id = String(pageId || "").trim();
      if (!id || id === DEFAULT_PAGE_ID) return "Prep List";
      return id
        .replace(/^page[-_]/i, "")
        .replace(/^subpage[-_]/i, "")
        .replace(/[-_]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase()) || id;
    }

    async function recoverMissingSubpagesFromItems() {
      try {
        const latest = await getCloudHomeConfig();
        const knownIds = getKnownHomePageIds(latest);
        const pageIdsFromItems = Array.from(new Set(
          (items || [])
            .map(item => String(item.pageId || DEFAULT_PAGE_ID).trim())
            .filter(Boolean)
        ));

        const missing = pageIdsFromItems.filter(pageId => !knownIds.has(pageId));
        if (!missing.length) return false;

        let category = (latest.categories || []).find(c => c && c.id === "recovered-subpages");
        if (!category) {
          category = {
            id: "recovered-subpages",
            name: "Recovered",
            pinned: false,
            subpages: []
          };
          latest.categories = latest.categories || [];
          latest.categories.push(category);
        }

        category.subpages = category.subpages || [];
        const existingInRecovered = new Set(category.subpages.map(p => p.id));

        missing.forEach(pageId => {
          if (!existingInRecovered.has(pageId)) {
            category.subpages.push({
              id: pageId,
              name: inferPageNameFromPageId(pageId),
              pinned: false
            });
          }
        });

        await pushHomeConfigToCloud(latest, "recover-missing-subpages-from-items");

        const openConfig = getHomeOpenConfig();
        openConfig[category.id] = true;
        saveHomeOpenConfig(openConfig);

        setStatus(`Recovered ${missing.length} hidden subpage(s)`);
        return true;
      } catch (error) {
        console.warn("Recover missing subpages skipped", error);
        return false;
      }
    }

    window.deleteEmptySection = async function(section, btn) {
      const sectionName = normalizeSectionName(section);
      if (!sectionName) return;

      const pageItems = getCurrentPageItems().filter(item => normalizeSectionName(item.section) === sectionName);
      if (pageItems.length) {
        alert(`Cannot delete "${sectionName}" because it still has ${pageItems.length} item(s).\n\nDelete or move the items first.`);
        setStatus(`Section not deleted - ${sectionName} has items`);
        return;
      }

      const ok = confirm(`Delete empty section "${sectionName}" from this subpage?\n\nNo list or recipe will be deleted.`);
      if (!ok) {
        setStatus("Delete section cancelled");
        return;
      }

      const sections = getStoredCustomSections().filter(s => normalizeSectionName(s) !== sectionName);
      saveCustomSections(sections);

      const layout = getSectionLayoutConfig();
      delete layout[sectionName];
      saveSectionLayoutConfig(layout);

      const collapsed = getSectionCollapsedConfig();
      delete collapsed[sectionName];
      saveSectionCollapsedConfig(collapsed);

      const orderConfig = getSectionOrderConfig();
      delete orderConfig[sectionSettingKey(sectionName)];
      await saveSectionOrderConfig(orderConfig);

      updateSectionDropdown();
      render();
      setStatus(`Deleted empty section: ${sectionName}`);
    };

    function compareText(a, b) {
      return String(a || "").localeCompare(String(b || ""), undefined, { sensitivity: "base", numeric: true });
    }
    function getDisplayPriority(item) {
      return item && item.checked ? 0 : 1;
    }

    function compareItemsForDisplay(a, b) {
      const priorityA = getDisplayPriority(a);
      const priorityB = getDisplayPriority(b);

      if (priorityA !== priorityB) return priorityA - priorityB;

      return compareText(a.item, b.item);
    }
    function sortItemsLocal() {
      const sections = getAllSections();
      items.sort((a, b) => {
        const sectionA = sections.indexOf(a.section) === -1 ? 999 : sections.indexOf(a.section);
        const sectionB = sections.indexOf(b.section) === -1 ? 999 : sections.indexOf(b.section);
        if (sectionA !== sectionB) return sectionA - sectionB;
        return compareItemsForDisplay(a, b);
      });
    }
    
    // ===== V18.27 BACKUP / RESTORE JSON =====
    function safeJsonCloneForBackup(value) {
      try {
        return JSON.parse(JSON.stringify(value));
      } catch (error) {
        return value;
      }
    }

    function normalizeBackupDocument(rawDoc) {
      if (!rawDoc || typeof rawDoc !== "object") return null;

      const id = String(rawDoc.id || rawDoc.docId || "").trim();
      const data = rawDoc.data && typeof rawDoc.data === "object" ? rawDoc.data : null;

      if (!id || !data) return null;

      return {
        id,
        data: safeJsonCloneForBackup(data)
      };
    }

    window.backupAllPrepData = async function() {
      try {
        setStatus("Creating backup...");
        const snap = await getDocs(prepRef);

        const documents = snap.docs.map(docSnap => ({
          id: docSnap.id,
          data: safeJsonCloneForBackup(docSnap.data())
        }));

        const backup = {
          app: "prep-list",
          backupVersion: 1,
          build: APP_BUILD_VERSION,
          backupAt: new Date().toISOString(),
          firestoreCollection: "prepItems",
          documentCount: documents.length,
          includes: [
            "items",
            "section",
            "pageId",
            "checked",
            "color",
            "qty",
            "recipe",
            "photo",
            "__homeConfig",
            "__sectionSettings",
            "all other fields"
          ],
          documents
        };

        const blob = new Blob([JSON.stringify(backup, null, 2)], {
          type: "application/json"
        });

        const stamp = new Date().toISOString().replace(/[:.]/g, "-");
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `prep-list-backup-${stamp}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus(`Backup downloaded OK (${documents.length} docs)`);
      } catch (error) {
        console.error(error);
        alert("Backup failed. Check internet / Firestore permission.");
        setStatus("Backup failed");
      }
    };

    window.restorePrepDataFromFile = async function(event) {
      const input = event && event.target;
      const file = input && input.files && input.files[0];

      try {
        if (!file) return;

        const text = await file.text();
        const parsed = JSON.parse(text);

        const rawDocuments = Array.isArray(parsed.documents)
          ? parsed.documents
          : Array.isArray(parsed)
            ? parsed
            : [];

        const documents = rawDocuments
          .map(normalizeBackupDocument)
          .filter(Boolean);

        if (!documents.length) {
          alert("Restore failed: no valid documents found in this JSON file.");
          setStatus("Restore failed - invalid JSON");
          return;
        }

        const hasHomeConfig = documents.some(docItem => docItem.id === HOME_CONFIG_DOC_ID);
        const hasSectionSettings = documents.some(docItem => docItem.id === SECTION_SETTINGS_DOC_ID);
        const itemCount = documents.filter(docItem =>
          docItem.id !== HOME_CONFIG_DOC_ID &&
          docItem.id !== SECTION_SETTINGS_DOC_ID &&
          docItem.data &&
          docItem.data.section !== "__meta" &&
          docItem.data.type !== "homeConfig" &&
          docItem.data.type !== "sectionSettings"
        ).length;

        const ok = confirm(
          `Restore backup from JSON?\n\n` +
          `File: ${file.name}\n` +
          `Documents: ${documents.length}\n` +
          `Items: ${itemCount}\n` +
          `Home config: ${hasHomeConfig ? "YES" : "NO"}\n` +
          `Section settings: ${hasSectionSettings ? "YES" : "NO"}\n\n` +
          `This will write these documents back to Firestore using the same document IDs.\n` +
          `It will NOT delete documents that are not in the backup.\n\n` +
          `Continue?`
        );

        if (!ok) {
          setStatus("Restore cancelled");
          return;
        }

        setStatus("Restoring backup...");

        let restored = 0;
        for (const docItem of documents) {
          await setDoc(doc(db, "prepItems", docItem.id), {
            ...docItem.data,
            restoredAt: serverTimestamp()
          }, { merge: false });
          restored += 1;
        }

        homeConfigCache = null;
        sectionOrderConfigCache = null;
        clearUnsyncedHomeConfig();

        setStatus(`Restore completed OK (${restored} docs). Reloading...`);
        alert(`Restore completed OK.\n\nRestored documents: ${restored}\n\nThe app will reload now.`);
        location.reload();
      } catch (error) {
        console.error(error);
        alert("Restore failed. Make sure the file is a valid prep-list backup JSON and Firestore permission allows writing.");
        setStatus("Restore failed");
      } finally {
        if (input) input.value = "";
      }
    };

    function render() {
      const content = document.getElementById("content");
      const pageItems = getCurrentPageItems();
      // V18.17: Do not blank the page when a subpage has no items.
      // Known sections are still shown with "No item yet".

      const q = String(searchQuery || "").trim().toLowerCase();
      const visibleItems = q
        ? pageItems.filter(item => {
            const text = `${item.item || ""} ${item.section || ""} ${item.recipe || ""}`.toLowerCase();
            return text.includes(q);
          })
        : pageItems;

      const groups = {};
      const sections = getAllSections();
      sections.forEach(section => { groups[section] = []; });

      visibleItems.forEach(item => {
        const section = normalizeSectionName(item.section) || "Other";
        if (!groups[section]) groups[section] = [];
        groups[section].push(item);
      });

      Object.keys(groups).forEach(section => { groups[section].sort(compareItemsForDisplay); });

      const halfSections = sections.filter(section => !isFullSection(section));
      const fullSections = sections.filter(section => isFullSection(section));

      const leftSection = halfSections[0] || "";
      const leftHtml = leftSection ? renderBox(leftSection, groups[leftSection] || [], { layout: "half" }) : "";
      const rightHtml = halfSections.slice(1).map(section => renderBox(section, groups[section] || [], { layout: "half" })).join("");
      const fullHtml = fullSections.map(section => renderBox(section, groups[section] || [], { layout: "full", forceShow: true })).join("");

      const emptySearch = q && !visibleItems.length ? `<div class="loading">No search result</div>` : "";
      content.innerHTML = emptySearch || `
        <div class="layout">
          <div class="leftCol">${leftHtml}</div>
          <div class="rightCol">${rightHtml}</div>
        </div>
        ${fullHtml ? `<div class="fullSections">${fullHtml}</div>` : ""}`;

    window.deleteSection = async function(section, btn) {
      if (!editMode || !deleteMode) return;

      animateSectionDeletePress(btn);
      await new Promise(resolve => setTimeout(resolve, 160));

      const clean = normalizeSectionName(section);
      const sectionItems = getCurrentPageItems().filter(item => normalizeSectionName(item.section) === clean);

      const ok = confirm(`Delete section "${clean}"?\n\nThis will delete ${sectionItems.length} item(s) in this section.`);
      if (!ok) {
        setStatus(`Delete section cancelled: ${clean}`);
        return;
      }

      items = items.filter(item => !((item.pageId || DEFAULT_PAGE_ID) === currentPageId && normalizeSectionName(item.section) === clean));

      const customSections = getStoredCustomSections().filter(sectionName => normalizeSectionName(sectionName) !== clean);
      saveCustomSections(customSections);

      const layoutConfig = getSectionLayoutConfig();
      delete layoutConfig[clean];
      saveSectionLayoutConfig(layoutConfig);

      const collapsedConfig = getSectionCollapsedConfig();
      delete collapsedConfig[clean];
      saveSectionCollapsedConfig(collapsedConfig);

      const orderConfig = getSectionOrderConfig();
      delete orderConfig[clean];
      saveSectionOrderConfig(orderConfig);

      updateSectionDropdown();
      render();

      if (!sectionItems.length) {
        setStatus(`Section removed: ${clean}`);
        return;
      }

      if (!navigator.onLine) {
        sectionItems.forEach(item => queueWrite({ type: "delete", id: item.id }));
        setStatus(`Section deleted locally: ${clean}. Will sync ${sectionItems.length} item(s) later.`);
        return;
      }

      try {
        await Promise.all(sectionItems.map(item => deleteDoc(doc(db, "prepItems", item.id))));
        setStatus(`Section deleted OK: ${clean}`);
      } catch (error) {
        console.error(error);
        sectionItems.forEach(item => queueWrite({ type: "delete", id: item.id }));
        setStatus(`Section deleted locally: ${clean}. Sync later.`);
      }
    };

    window.toggleSectionCollapse = function(section, btn) {
      animateEyePress(btn);

      setTimeout(() => {
        const clean = normalizeSectionName(section);
        const config = getSectionCollapsedConfig();
        config[clean] = !config[clean];
        saveSectionCollapsedConfig(config);

        const box = btn ? btn.closest(".box") : null;
        const rows = box ? box.querySelector(".sectionRows") : null;

        if (rows) {
          rows.classList.toggle("hidden", !!config[clean]);
          box.classList.toggle("boxCollapsed", !!config[clean]);
        } else {
          render();
        }

        if (btn) {
          btn.classList.toggle("eyeClosed", !!config[clean]);
          btn.textContent = config[clean] ? "🔻" : "🔺";
          btn.setAttribute("aria-label", config[clean] ? "Show section" : "Hide section");
          btn.setAttribute("title", config[clean] ? "Show section" : "Hide section");
        }

        setStatus(config[clean] ? `Hidden section: ${clean}` : `Showing section: ${clean}`);

    window.toggleCheck = async function(id) {
      if (deleteMode || isSaving) return;
      const item = items.find(x => x.id === id); if (!item) return;

      item.checked = !item.checked;

      // If unticked, reset colour back to none automatically.
      if (!item.checked) {
        item.color = "none";
      }

      render();
      await saveItemChange(item);

    function animateColourChange(id, colour) {
      const safe = (colour || "none").toLowerCase();
      const row = document.querySelector(`[data-row-id="${CSS.escape(id)}"]`);
      if (!row) return;
      row.classList.remove(
        "colour-slide-red",
        "colour-slide-green",
        "colour-slide-yellow",
        "colour-slide-blue",
        "colour-slide-none"
      );
      void row.offsetWidth;
      row.classList.add(`colour-slide-${safe}`);
      setTimeout(() => {
        row.classList.remove(
          "colour-slide-red",
          "colour-slide-green",
          "colour-slide-yellow",
          "colour-slide-blue",

    window.changeColor = async function(id, color) {
      if (isSaving) return;
      const item = items.find(x => x.id === id);
      if (!item) return;
      const nextColor = color || "none";
      animateColourChange(id, nextColor);
      setTimeout(() => {
        item.color = nextColor;
        render();
        saveItemChange(item);
      }, 260);
    };
    async function saveItemChange(item) {
      setSavingState(true);
      setStatus(navigator.onLine ? "Saving..." : "Saving...");
      try {
        await savePatch(item.id, {
          checked: !!item.checked,
          color: item.color || "none"
        });
      } finally {
        setSavingState(false);
      }
    }
    let orderQtyTimers = {};
    window.saveOrderQty = function(id, value) {
      const item = items.find(x => x.id === id); if (!item) return;

      const clean = String(value || "").replace(/[^0-9]/g, "").slice(0, 4);
      item.orderQty = clean;

      const input = document.querySelector(`input[data-order-input="${CSS.escape(id)}"]`);
      if (input && input.value !== clean) input.value = clean;

      if (orderQtyTimers[id]) clearTimeout(orderQtyTimers[id]);

      // iPhone fix: do not save/re-render while the number input is focused.
      // Saving while focused can trigger Firestore snapshot -> render -> keyboard auto hides.
      orderQtyTimers[id] = setTimeout(() => {
        const active = document.activeElement;
        const stillTyping = active && active.matches && active.matches(`input[data-order-input="${CSS.escape(id)}"]`);

        if (stillTyping) return;

        savePatch(id, { orderQty: clean }, { silent: true });
      }, 900);
    };

    window.commitOrderQty = function(id) {
      const item = items.find(x => x.id === id); if (!item) return;
      const clean = String(item.orderQty || "").replace(/[^0-9]/g, "").slice(0, 4);

      if (orderQtyTimers[id]) {
        clearTimeout(orderQtyTimers[id]);
        delete orderQtyTimers[id];
      }

      savePatch(id, { orderQty: clean }, { silent: true });
    };
    function commitFocusedOrderQty() {
      const active = document.activeElement;
      if (!active || !active.matches || !active.matches("input[data-order-input]")) return;

      const id = active.getAttribute("data-order-input");
      if (id) commitOrderQty(id);
    }

    window.toggleSectionOrderMode = async function(section) {
      if (!editMode) return;

      const clean = normalizeSectionName(section);
      const key = sectionSettingKey(clean);
      const config = { ...getSectionOrderConfig() };
      const nextValue = !isOrderSection(clean);

      config[key] = nextValue;

      // Remove old global section key to prevent random cross-page ON/OFF.
      if (Object.prototype.hasOwnProperty.call(config, clean)) delete config[clean];

      await saveSectionOrderConfig(config);
      render();
      setStatus(`${clean} QTY ${nextValue ? "ON" : "OFF"} / synced`);
    };
    function getPickupLines(sectionFilter = "") {
      return items
        .filter(item => {
          const section = normalizeSectionName(item.section);
          if (sectionFilter && section !== normalizeSectionName(sectionFilter)) return false;
          if (!isOrderSection(section)) return false;
          return String(item.orderQty || "").trim();
        })
        .sort((a, b) => {
          const sectionCompare = compareText(a.section, b.section);
          if (sectionFilter || sectionCompare === 0) return compareItemsForDisplay(a, b);
          return sectionCompare;
        })
        .map(item => `${item.item} x ${item.orderQty}`);
    }
    async function copyTextToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        const ok = document.execCommand("copy");
        textarea.remove();
        return ok;
      }
    }

    window.resetSectionQty = async function(section, btn) {

      await new Promise(resolve => setTimeout(resolve, 180));
      const targetSection = normalizeSectionName(section);
      const sectionItems = items.filter(item => normalizeSectionName(item.section) === targetSection);
      const qtyItems = sectionItems.filter(item => String(item.orderQty || "").trim());
      if (!qtyItems.length) {
        setStatus(`No QTY to reset in ${section}`);
        return;
      }
      const ok = confirm(`Reset QTY in ${section}?\n\nThis will clear ${qtyItems.length} item(s).`);

        setStatus(`Reset QTY cancelled: ${section}`);
        return;

      qtyItems.forEach(item => {
        item.orderQty = "";

      await Promise.all(qtyItems.map(item => savePatch(item.id, { orderQty: "" }, { silent: true })));
      setStatus(`Reset QTY: ${section}`);

      const text = `${section}\n` + lines.join("\n");
      await copyTextToClipboard(text);

    window.openPhotoViewer = function() {

      if (!item) return;
      activePhotoItemId = item.id;

      } else {

      }
      document.getElementById("photoModal").classList.add("show");
    };
    window.photoOverlayClose = function(event) {
      if (event.target && event.target.id === "photoModal") closePhotoViewer();
    };
    window.closePhotoViewer = function() {
      document.getElementById("photoModal").classList.remove("show");
      activePhotoItemId = null;
    };
    window.choosePhoto = function() {
      if (!editMode || !activeRecipeItemId) return;
      const input = document.getElementById("photoInput");
      if (!input) return;
      input.value = "";
      input.click();
    };
    window.handlePhotoSelected = async function(event) {
      if (!editMode || !activeRecipeItemId) return;
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      if (!file.type || !file.type.startsWith("image/")) {
        setStatus("Please choose an image file");
        return;
      }
      setStatus("Compressing photo...");
      try {
        const photoData = await compressImageFile(file);
        if (photoData.length > 850000) {
          setStatus("Photo too large after compression ERROR");
          alert("Photo is still too large. Please choose a smaller image.");
          return;
        }
        setStatus("Saving photo...");
        await savePatch(activeRecipeItemId, {
          photoData,
          photoName: file.name || "photo.jpg",
          photoUpdatedAtClient: Date.now()
        });
        const item = items.find(x => x.id === activeRecipeItemId);
        if (item) {
          item.photoData = photoData;
          item.photoName = file.name || "photo.jpg";
        }
        updatePhotoButtons(item);
        render();
        setStatus("Photo saved OK");
      } catch (error) {
        console.error(error);
        setStatus("Photo save failed ERROR");
        alert("Photo upload failed. Try a smaller photo.");
      }
    };
    function compressImageFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const maxSize = 850;
            let width = img.width;
            let height = img.height;
            if (width > height && width > maxSize) {
              height = Math.round(height * (maxSize / width));
              width = maxSize;
            } else if (height >= width && height > maxSize) {
              width = Math.round(width * (maxSize / height));
              height = maxSize;
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            let quality = 0.62;
            let dataUrl = canvas.toDataURL("image/jpeg", quality);
            while (dataUrl.length > 650000 && quality > 0.35) {
              quality -= 0.08;
              dataUrl = canvas.toDataURL("image/jpeg", quality);
            }
            resolve(dataUrl);
          };
          img.onerror = () => reject(new Error("Could not load image"));
          img.src = reader.result;
        };
        reader.onerror = () => reject(new Error("Could not read image"));
        reader.readAsDataURL(file);
      });
    }
    window.deletePhoto = async function() {
      if (!editMode || !activeRecipeItemId) return;
      const item = items.find(x => x.id === activeRecipeItemId);

      setStatus("Deleting photo...");
      try {

          photoData: "",

          photoUpdatedAtClient: Date.now()
        });

        delete item.photoName;
        updatePhotoButtons(item);
        closePhotoViewer();
        render();
        setStatus("Photo deleted OK");
      } catch (error) {
        console.error(error);
        setStatus("Photo delete failed ERROR");
      }

    function renderRecipePreview(recipeText) {
      const lines = recipeLines(recipeText);
      if (!lines.length) {
        document.getElementById("modalBody").innerHTML =
          `<div class="recipeTextView"><span class="recipeEmpty">No recipe/note for this item yet</span></div>`;
        return;
      }
      const item = items.find(x => x.id === activeRecipeItemId);
      const checks = getRecipeChecks(item);
      const rows = lines.map((line, index) => {
        const key = String(index);
        const hasNumber = /-?\d+(?:\.\d+)?/.test(line);
        const checked = hasNumber && !!checks[key];
        if (!hasNumber) {
          return `
            <div class="recipeCheckLine noCheck">
              <span class="recipeCheckSpacer"></span>
              <span class="recipeCheckText">${escapeHtml(line)}</span>
            </div>
          `;
        }
        return `
          <label class="recipeCheckLine ${checked ? "done" : ""}">
            <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleRecipeCheck('${key}', this.checked)">
            <span class="recipeCheckText">${escapeHtml(line)}</span>
          </label>
        `;
      }).join("");
      document.getElementById("modalBody").innerHTML = `<div class="recipeCheckList">${rows}</div>`;
    }
    function recipeLines(recipeText) {
      return String(recipeText || "")
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);
    }
    function getRecipeChecks(item) {
      if (!item || !item.recipeChecks || typeof item.recipeChecks !== "object") return {};
      return { ...item.recipeChecks };
    }
    window.toggleRecipeCheck = function(key, checked) {
      if (editMode || !activeRecipeItemId) return;
      const item = items.find(x => x.id === activeRecipeItemId);
      if (!item) return;
      const checks = getRecipeChecks(item);
      checks[key] = checked;
      item.recipeChecks = checks;
      renderRecipePreview(currentRecipePreview || originalRecipePreview);
      scheduleRecipeCheckSave(item.id, checks);
    };
    function scheduleRecipeCheckSave(id, checks) {
      if (recipeCheckSaveTimer) clearTimeout(recipeCheckSaveTimer);
      setStatus("Checklist saving...");
      recipeCheckSaveTimer = setTimeout(async () => {
        try {
          await savePatch(id, { recipeChecks: checks }, { silent: true });
          setStatus("Checklist saved OK");
        } catch (error) {
          console.error(error);
          setStatus("Checklist save failed ERROR");
        }
      }, 300);
    }
    function setMultiplierButtonState(value) {
      activeMultiplierValue = value || 1;
      const buttons = [
        document.getElementById("multiplierBtn1"),
        document.getElementById("multiplierBtn2"),
        document.getElementById("multiplierBtn3"),
        document.getElementById("multiplierBtnCustom")
      ].filter(Boolean);
      buttons.forEach(btn => btn.classList.remove("multiplierActive"));
      let targetId = "multiplierBtn1";
      if (activeMultiplierValue === 2) targetId = "multiplierBtn2";
      else if (activeMultiplierValue === 3) targetId = "multiplierBtn3";
      else if (activeMultiplierValue === "custom") targetId = "multiplierBtnCustom";
      const target = document.getElementById(targetId);
      if (target) target.classList.add("multiplierActive");
    }
    function resetMultiplierPreviewOnly() {
